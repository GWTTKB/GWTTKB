<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWTTKB League War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080e;--s1:#090e18;--s2:#0d1420;--s3:#131d2e;--s4:#1a2640;
  --teal:#00d4ff;--green:#00e676;--gold:#ffb700;--red:#ff3d57;
  --orange:#ff8c00;--purple:#9b6dff;
  --txt:#e8f0fa;--txt2:#8ba4c0;--txt3:#4d6a8a;
  --bdr:rgba(0,212,255,0.10);--bdr2:rgba(0,212,255,0.22);
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 24px;background:rgba(5,8,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);gap:16px;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--teal);text-decoration:none;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);text-decoration:none;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--teal);}
.nav-spacer{flex:1;}
.nav-cta{padding:6px 16px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;text-decoration:none;border-radius:5px;}

/* HERO */
.hero{min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:48px 48px;}
.hero::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:600px;height:280px;background:radial-gradient(ellipse,rgba(0,212,255,0.05),transparent 65%);pointer-events:none;}
.hero-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--teal);margin-bottom:8px;position:relative;z-index:1;display:flex;align-items:center;gap:10px;}
.hero-eyebrow::before{content:'';width:28px;height:1px;background:var(--teal);}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);letter-spacing:2px;text-align:center;margin-bottom:6px;position:relative;z-index:1;}
.hero-sub{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:24px;position:relative;z-index:1;}
.search-form{display:flex;flex-direction:column;gap:8px;max-width:520px;width:100%;position:relative;z-index:1;}
.input-row{display:flex;}
.si{flex:1;padding:12px 16px;background:var(--s1);border:1px solid var(--bdr2);border-right:none;border-radius:10px 0 0 10px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s;}
.si:focus{border-color:var(--teal);}
.si::placeholder{color:var(--txt3);}
.si2{max-width:160px;border-radius:0;border-left:1px solid var(--bdr2);border-right:none;}
.sb{padding:12px 22px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;border:none;border-radius:0 10px 10px 0;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.sb:hover{background:#00f0ff;}
.sb:disabled{background:var(--s3);color:var(--txt3);cursor:not-allowed;}
.sh{font-family:var(--mono);font-size:10px;color:var(--txt3);text-align:center;}

/* LEAGUE PICKER */
.lp{max-width:500px;width:100%;z-index:1;position:relative;}
.lp-lbl{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;margin-bottom:8px;text-align:center;}
.lp-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.lp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.lp-item:hover{border-color:var(--teal);background:rgba(0,212,255,0.04);}
.lp-nm{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);flex:1;}
.lp-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.lp-badge{padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;}
.lp-sf{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.lp-qb{background:rgba(155,109,255,0.1);color:var(--purple);border:1px solid rgba(155,109,255,0.2);}

/* LOADING */
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:14px;}
.lb-wrap{width:360px;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;}
.lb{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:2px;transition:width 0.5s ease;}
.ll{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--txt2);}
.lstep{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:9px 20px;background:var(--s1);border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.tb-lg{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;}
.tb-b{padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;}
.b-t{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.b-p{background:rgba(155,109,255,0.1);color:var(--purple);border:1px solid rgba(155,109,255,0.2);}
.b-g{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.my-badge{padding:4px 10px;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--teal);letter-spacing:1px;}

/* MY STATS ROW */
.my-stats-row{padding:10px 20px;background:var(--s2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.msr-label{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:1px;}
.pos-grade{padding:3px 8px;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;font-weight:700;}
.pg-A{background:rgba(0,230,118,0.15);color:var(--green);}
.pg-B{background:rgba(0,212,255,0.12);color:var(--teal);}
.pg-C{background:rgba(255,183,0,0.12);color:var(--gold);}
.pg-D{background:rgba(255,61,87,0.15);color:var(--red);}

/* TABS */
.tabs-bar{position:sticky;top:52px;z-index:90;background:rgba(5,8,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;overflow-x:auto;}
.tab-btn{padding:12px 16px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center;}
.fb-btn{padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;background:var(--s1);border:1px solid var(--bdr);border-radius:5px;color:var(--txt3);cursor:pointer;transition:all 0.15s;}
.fb-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,255,0.08);}
.fb-right{margin-left:auto;}

/* WAR ROOM LAYOUT */
.war-room{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 200px);min-height:500px;}
.wr-left{border-right:1px solid var(--bdr);overflow-y:auto;background:var(--s1);}
.wr-right{overflow-y:auto;background:var(--bg);}

/* MANAGER LIST */
.mgr-section{padding:10px 12px 4px;}
.mgr-section-title{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;color:var(--teal);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mgr-section-title.gold{color:var(--gold);}
.mgr-section-title.red{color:var(--txt3);}
.mgr-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-bottom:4px;border:1px solid transparent;}
.mgr-item:hover{background:var(--s2);border-color:var(--bdr);}
.mgr-item.active{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.25);}
.mgr-item.is-me{border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.04);}
.mi-score{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;}
.mi-body{flex:1;min-width:0;}
.mi-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);}
.mi-desc{font-size:11px;color:var(--txt3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi-grades{display:flex;gap:3px;margin-top:3px;}
.mg{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;}
.mg-A{color:var(--green);}
.mg-B{color:var(--teal);}
.mg-C{color:var(--gold);}
.mg-D{color:var(--red);}
.mi-intel{font-family:var(--mono);font-size:9px;color:var(--txt3);}

/* INTEL PANEL */
.intel-panel{padding:20px 24px;}
.ip-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bdr);}
.ip-av{width:52px;height:52px;border-radius:50%;background:var(--s3);flex-shrink:0;overflow:hidden;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:22px;}
.ip-av img{width:100%;height:100%;object-fit:cover;}
.ip-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;}
.ip-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:3px;}
.ip-grades{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.ip-grade{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;}
.ip-score{margin-left:auto;text-align:center;flex-shrink:0;}
.ip-score-val{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;}
.ip-score-lbl{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:1px;}

/* YOUR PLAY BANNER */
.your-play{background:linear-gradient(135deg,var(--s3),var(--s4));border:1px solid var(--bdr2);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.yp-icon{font-size:22px;flex-shrink:0;}
.yp-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;margin-bottom:3px;}
.yp-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--txt);}

/* INTEL SECTIONS */
.intel-section{margin-bottom:20px;}
.is-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;border-bottom:1px solid var(--bdr);margin-bottom:12px;}
.is-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--txt2);}
.is-count{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.intel-cards{display:flex;flex-direction:column;gap:8px;}
.intel-card{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;position:relative;transition:border-color 0.15s;}
.intel-card:hover{border-color:var(--bdr2);}
.ic-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.ic-body{flex:1;}
.ic-tags{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.ic-tag{padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:1px;}
.tag-roster{background:rgba(255,61,87,0.15);color:var(--red);border:1px solid rgba(255,61,87,0.3);}
.tag-pick{background:rgba(155,109,255,0.15);color:var(--purple);border:1px solid rgba(155,109,255,0.3);}
.tag-trade{background:rgba(0,212,255,0.12);color:var(--teal);border:1px solid rgba(0,212,255,0.25);}
.tag-rel{background:rgba(255,183,0,0.12);color:var(--gold);border:1px solid rgba(255,183,0,0.25);}
.tag-style{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.tag-league{background:rgba(139,164,192,0.1);color:var(--txt3);border:1px solid rgba(139,164,192,0.15);}
.tag-strong{background:rgba(0,230,118,0.12);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.ic-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.ic-desc{font-size:12px;color:var(--txt2);line-height:1.5;}

/* TRADE HISTORY TAB */
.trades-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:12px 20px;border-bottom:1px solid var(--bdr);}
.tf{padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;background:var(--s1);border:1px solid var(--bdr);border-radius:5px;color:var(--txt3);cursor:pointer;transition:all 0.15s;}
.tf.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,255,0.08);}
.trades-list{padding:12px 20px;display:flex;flex-direction:column;gap:8px;}
.trade-card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;transition:border-color 0.15s;}
.trade-card:hover{border-color:var(--bdr2);}
.tc-head{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--bdr);}
.tc-wk{font-family:var(--mono);font-size:10px;color:var(--txt3);min-width:90px;}
.tc-teams{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;}
.tc-grade{padding:3px 8px;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:15px;}
.tg-A{background:rgba(0,230,118,0.15);color:var(--green);}
.tg-B{background:rgba(0,212,255,0.12);color:var(--teal);}
.tg-C{background:rgba(255,183,0,0.12);color:var(--gold);}
.tg-D{background:rgba(255,140,0,0.12);color:var(--orange);}
.tg-F{background:rgba(255,61,87,0.15);color:var(--red);}
.tc-body{padding:10px 14px;display:grid;grid-template-columns:1fr 44px 1fr;gap:8px;align-items:start;}
.tc-side{font-size:12px;color:var(--txt2);line-height:1.7;}
.tc-side.w{border-left:3px solid var(--green);padding-left:8px;}
.tc-side.l{border-left:3px solid var(--red);padding-left:8px;}
.tc-side strong{color:var(--txt);display:block;margin-bottom:2px;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
.asset{display:inline-block;padding:1px 6px;background:var(--s3);border-radius:3px;margin:1px 2px 1px 0;font-size:11px;color:var(--txt2);}
.pick-asset{background:rgba(155,109,255,0.15);color:var(--purple);border:1px solid rgba(155,109,255,0.2);}
.tc-vs{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--txt3);text-align:center;padding-top:2px;}
.tc-pct{font-family:var(--mono);font-size:9px;text-align:center;margin-top:2px;}

/* NEEDS MATRIX */
.matrix-wrap{padding:16px 20px;overflow-x:auto;}
.matrix-table{width:100%;border-collapse:collapse;}
.matrix-table th{padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--txt3);border-bottom:1px solid var(--bdr);background:var(--s1);white-space:nowrap;}
.matrix-table td{padding:9px 12px;border-bottom:1px solid rgba(0,212,255,0.04);vertical-align:middle;}
.matrix-table tr.me td{background:rgba(0,212,255,0.03);}
.mgr-cell-nm{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;}
.nd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;margin:0 auto;}
.nd-h{background:rgba(255,61,87,0.2);color:var(--red);border:2px solid rgba(255,61,87,0.4);}
.nd-m{background:rgba(255,183,0,0.15);color:var(--gold);border:2px solid rgba(255,183,0,0.3);}
.nd-g{background:rgba(0,230,118,0.1);color:var(--green);border:2px solid rgba(0,230,118,0.25);}

/* SOFT / TIMING */
.rank-list{padding:12px 20px;display:flex;flex-direction:column;gap:8px;}
.rank-card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:12px;transition:border-color 0.15s;}
.rank-card:hover{border-color:var(--bdr2);}
.rk-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--txt3);width:28px;text-align:center;flex-shrink:0;}
.rk-info{flex:1;}
.rk-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:2px;}
.rk-detail{font-size:12px;color:var(--txt2);line-height:1.5;}
.rk-score{text-align:right;flex-shrink:0;}
.rk-val{font-family:'Bebas Neue',sans-serif;font-size:24px;}
.rk-lbl{font-family:var(--mono);font-size:9px;color:var(--txt3);}

/* COACH CTA */
.coach-cta{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--bdr2);border-radius:12px;padding:18px 22px;position:relative;overflow:hidden;margin:16px 20px;}
.coach-cta::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--purple));}
.cta-row{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.cta-icon{font-size:28px;flex-shrink:0;}
.cta-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:2px;}
.cta-body{font-size:12px;color:var(--txt2);line-height:1.4;max-width:440px;}
.cta-btn{margin-left:auto;flex-shrink:0;padding:8px 18px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;text-decoration:none;border-radius:6px;white-space:nowrap;}

.empty{text-align:center;padding:48px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;}
@media(max-width:900px){.nav-links{display:none;}.war-room{grid-template-columns:1fr;height:auto;}}
</style>
</head>

<div class="hero" id="heroSection">
  <div class="hero-eyebrow">League War Room</div>
  <h1 class="hero-title">GM INTELLIGENCE<br>BRIEFING</h1>
  <p class="hero-sub">Enter your Sleeper username and league ID. Full war room — your perspective.</p>
  <div class="search-form" id="searchForm">
    <div class="input-row">
      <input class="si" id="uInput" type="text" placeholder="Your Sleeper username...">
      <input class="si si2" id="lInput" type="text" placeholder="League ID (optional)">
      <button class="sb" id="sb" onclick="go()">ANALYZE →</button>
    </div>
    <div class="sh">No account needed — just your Sleeper username</div>
  </div>
  <div class="lp" id="leaguePicker" style="display:none"></div>
</div>

<div id="topBar" style="display:none"></div>
<div id="myStatsRow" style="display:none"></div>
<div class="tabs-bar" id="tabsBar" style="display:none">
  <button class="tab-btn active" onclick="setTab('warroom',this)">🎯 War Room</button>
  <button class="tab-btn" onclick="setTab('needs',this)">📊 Needs Matrix</button>
  <button class="tab-btn" onclick="setTab('trades',this)">📋 Trade History</button>
  <button class="tab-btn" onclick="setTab('targets',this)">🎣 Soft Targets</button>
  <button class="tab-btn" onclick="setTab('timing',this)">📈 Market Timing</button>
</div>
<div id="content"></div>

<script>
const API='https://api.sleeper.app/v1';
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let LD=null;
let PM={};   // player map id→{name,pos,team,age,value}
let CSF={};  // consensus SF values by normname
let C1QB={}; // consensus 1QB values
let ACTIVE_MGR=null;
let SEASON_FILTER='all';
let WR_FILTER='all';

function norm(n){return String(n).toLowerCase().replace(/[^a-z0-9]/g,'');}
async function get(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json();}

// ── LOAD CONSENSUS VALUES ──
async function loadConsensus(){
  try{
    const r=await fetch('/data/consensus.json');
    const d=await r.json();
    // Use consensus rankings as the value source
    const sfp=d.formats?.sf_ppr?.players||d.players||[];
    const q1p=d.formats?.qb1_ppr?.players||[];
    for(const p of sfp){
      CSF[norm(p.name)]=p.value;
      if(p.id)PM[p.id]={name:p.name,pos:p.pos||p.position,team:p.team,age:p.age,
        value:p.value,headshot:p.headshot_url||''};
    }
    for(const p of q1p)C1QB[norm(p.name)]=p.value;
    console.log('Consensus SF:',Object.keys(CSF).length,'players');
  }catch(e){console.warn('Consensus load:',e);}
}

async function loadSleeperPlayers(){
  try{
    const data=await get(`${API}/players/nfl`);
    for(const[id,p]of Object.entries(data)){
      if(!p?.full_name||!['QB','RB','WR','TE'].includes(p.position))continue;
      const val=CSF[norm(p.full_name)]||0;
      if(!PM[id]){PM[id]={name:p.full_name,pos:p.position,team:p.team||'FA',
        age:p.age||0,value:val,headshot:`https://sleepercdn.com/content/nfl/players/${id}.jpg`};}
      else{PM[id].headshot=PM[id].headshot||`https://sleepercdn.com/content/nfl/players/${id}.jpg`;}
    }
    console.log('Player map total:',Object.keys(PM).length);
  }catch(e){console.warn('Sleeper players:',e);}
}

// ── PICK LABEL ──
function pickLabel(pk){
  if(!pk)return'Unknown Pick';
  const yr=pk.season||pk.year||'?';
  const rd=parseInt(pk.round||1);
  const slot=pk.pick_no;
  const rdStr=rd===1?'1st':rd===2?'2nd':rd===3?'3rd':`${rd}th`;
  if(slot){
    const slotStr=String(slot).padStart(2,'0');
    const tier=slot<=4?'Early':slot<=8?'Mid':'Late';
    return`${yr} ${rdStr} (${tier} · #${slotStr})`;
  }
  return`${yr} ${rdStr} Rd`;
}

function pickVal(pk){
  const rd=parseInt(pk.round||1);
  const yr=parseInt(pk.season||pk.year||2025);
  const slot=pk.pick_no||0;
  const base=rd===1?7000:rd===2?3800:rd===3?2200:1400;
  const slotMult=slot?(1+((16-slot)/16)*0.5):1;
  const yrMult=yr<=2025?1:yr===2026?0.85:0.72;
  return Math.round(base*slotMult*yrMult);
}

function playerVal(id){
  const p=PM[id];
  if(!p)return 0;
  return LD?.isSF?(CSF[norm(p.name||'')]||p.value||0):(C1QB[norm(p.name||'')]||p.value||0);
}

// ── GRADE LETTER ──
function gradeFor(pct){return pct<=5?'A':pct<=15?'B':pct<=30?'C':pct<=50?'D':'F';}
function posGradeLetter(val,pos){
  const T={QB:[14000,9000,5000],RB:[22000,14000,8000],WR:[22000,14000,8000],TE:[10000,6000,3000]};
  const t=T[pos]||[10000,6000,3000];
  return val>=t[0]?'A+':val>=t[1]?'A':val>=t[2]?'B+':'B';}

// ── WINDOW CLASSIFICATION ──
function classifyWindow(totalVal,avgAge,posPeak){
  // posPeak = % of value in players aged 26-30
  if(totalVal>55000&&avgAge<26.5)return{w:'CONTENDING',c:'var(--green)',bc:'wb-c'};
  if(totalVal>50000&&avgAge>=28)return{w:'PEAKING',c:'var(--gold)',bc:'wb-p'};
  if(totalVal>40000&&avgAge<28)return{w:'COMPETING',c:'var(--teal)',bc:'wb-cp'};
  if(totalVal<28000&&avgAge<26)return{w:'REBUILDING',c:'var(--purple)',bc:'wb-r'};
  if(totalVal<28000&&avgAge>=28)return{w:'DECLINING',c:'var(--red)',bc:'wb-d'};
  return{w:'MIDDLE',c:'var(--gold)',bc:'wb-m'};
}

// ── GO: username lookup or direct analyze ──
async function go(){
  const u=document.getElementById('uInput').value.trim();
  const l=document.getElementById('lInput').value.trim();
  if(!u){alert('Enter your Sleeper username');return;}
  if(l){await runScout(u,l);return;}
  // Lookup leagues
  document.getElementById('sb').disabled=true;
  document.getElementById('sb').textContent='LOOKING UP...';
  try{
    const user=await get(`${API}/user/${u}`);
    if(!user?.user_id)throw new Error('User not found');
    const leagues=await get(`${API}/user/${user.user_id}/leagues/nfl/2025`);
    const dyn=(leagues||[]).filter(l=>l.settings?.type===2);
    if(!dyn.length){alert('No 2025 dynasty leagues found. Try entering League ID directly.');return;}
    if(dyn.length===1){await runScout(u,dyn[0].league_id);return;}
    showPicker(dyn,user);
  }catch(e){alert(e.message);}
  document.getElementById('sb').disabled=false;
  document.getElementById('sb').textContent='ANALYZE →';
}

function showPicker(leagues,user){
  document.getElementById('searchForm').style.display='none';
  const el=document.getElementById('leaguePicker');
  el.style.display='block';
  el.innerHTML=`<div class="lp-lbl">SELECT YOUR LEAGUE — @${user.display_name||user.username}</div>
  <div class="lp-list">${leagues.map(l=>{
    const sf=(l.roster_positions||[]).includes('SUPER_FLEX');
    return`<div class="lp-item" onclick="runScout('${user.username||user.display_name}','${l.league_id}')">
      <div><div class="lp-nm">${l.name||'League'}</div><div class="lp-meta">${l.total_rosters||12} teams · ${l.season}</div></div>
      <span class="lp-badge ${sf?'lp-sf':'lp-qb'}">${sf?'SF':'1QB'}</span>
    </div>`;
  }).join('')}</div>`;
}

// ── MAIN ──
async function runScout(username,leagueId){
  document.getElementById('sb').disabled=true;
  document.getElementById('sb').textContent='LOADING...';
  document.getElementById('tabsBar').style.display='none';
  document.getElementById('topBar').style.display='none';
  document.getElementById('myStatsRow').style.display='none';
  document.getElementById('leaguePicker').style.display='none';
  showLoad('INITIALIZING WAR ROOM',0);

  try{
    upLoad('LOADING CONSENSUS VALUES',12);
    await Promise.all([loadConsensus(),loadSleeperPlayers()]);

    upLoad('FETCHING LEAGUE',25);
    const[league,rosters,users]=await Promise.all([
      get(`${API}/league/${leagueId}`),
      get(`${API}/league/${leagueId}/rosters`),
      get(`${API}/league/${leagueId}/users`)
    ]);

    const isSF=(league.roster_positions||[]).includes('SUPER_FLEX');
    const userMap={};
    for(const u of users)userMap[u.user_id]=u;
    const meUser=await get(`${API}/user/${username}`).catch(()=>null);
    const myUID=meUser?.user_id;

    upLoad('BUILDING ROSTERS',38);

    const teams=rosters.map(r=>{
      const u=userMap[r.owner_id]||{};
      const isMe=r.owner_id===myUID;
      const players=(r.players||[]).map(id=>{
        const p=PM[id]||{name:id,pos:'?',value:0,age:0};
        const val=isSF?(CSF[norm(p.name||'')]||p.value||0):(C1QB[norm(p.name||'')]||p.value||0);
        return{id,...p,value:val};
      }).filter(p=>['QB','RB','WR','TE'].includes(p.pos));

      players.sort((a,b)=>b.value-a.value);
      const total=players.reduce((s,p)=>s+p.value,0);

      const byPos={QB:[],RB:[],WR:[],TE:[]};
      for(const p of players)if(byPos[p.pos])byPos[p.pos].push(p);

      // Positional values (top starters)
      const posVal={};
      const STARTERS={QB:2,RB:4,WR:4,TE:2};
      for(const[pos,arr]of Object.entries(byPos)){
        posVal[pos]=arr.slice(0,STARTERS[pos]).reduce((s,p)=>s+p.value,0);
      }

      // Positional grades
      const THRESH={QB:[14000,9000,5000],RB:[22000,14000,8000],WR:[22000,14000,8000],TE:[10000,6000,3000]};
      const posGrades={};
      for(const pos of Object.keys(byPos)){
        const v=posVal[pos];const t=THRESH[pos];
        posGrades[pos]=v>=t[0]?'strong':v>=t[1]?'ok':'weak';
      }

      const playersWithAge=players.filter(p=>p.age>18);
      const avgAge=playersWithAge.length?playersWithAge.reduce((s,p)=>s+p.age,0)/playersWithAge.length:26;

      const win=classifyWindow(total,avgAge);

      // Pick count
      const picks=(r.players||[]).filter(id=>id.startsWith('2')||String(id).length<8);

      return{roster_id:r.roster_id,owner_id:r.owner_id,isMe,
        username:u.display_name||u.username||'Unknown',
        avatar:u.avatar?`https://sleepercdn.com/avatars/${u.avatar}`:'',
        team_name:r.metadata?.team_name||'',
        players,total,byPos,posVal,posGrades,win,avgAge,
        wins:r.settings?.wins||0,losses:r.settings?.losses||0};
    }).sort((a,b)=>b.total-a.total);

    upLoad('PULLING TRADE HISTORY',52);
    await sleep(200);

    // Pull ALL transactions — follow previous_league_id chain
    const allTrades=[];
    const waiverAct={};
    let scanLeagueId=leagueId;
    let seasonNum=2025;
    const leagueChain=[];

    // Build league chain (up to 5 seasons back)
    for(let i=0;i<5;i++){
      try{
        const lg=await get(`${API}/league/${scanLeagueId}`);
        leagueChain.push({id:scanLeagueId,season:seasonNum});
        if(lg.previous_league_id&&lg.previous_league_id!==scanLeagueId){
          scanLeagueId=lg.previous_league_id;
          seasonNum--;
        }else break;
      }catch(e){break;}
    }

    console.log('League chain:',leagueChain.map(l=>`${l.season}:${l.id}`).join(', '));

    for(const{id:lgId,season}of leagueChain){
      for(let week=1;week<=22;week++){
        let txns;
        try{txns=await get(`${API}/league/${lgId}/transactions/${week}`);}
        catch(e){break;}
        if(!txns?.length)break;
        for(const t of txns){
          if(t.type==='trade'&&t.status==='complete')allTrades.push({...t,week,season});
          if(t.type==='waiver'&&t.status==='complete'&&season===2025){
            const rid=t.roster_ids?.[0];
            if(rid)waiverAct[rid]=(waiverAct[rid]||0)+1;
          }
        }
        await sleep(35);
      }
    }

    upLoad('GRADING TRADES',74);
    await sleep(200);

    const gradedTrades=allTrades.map(t=>{
      const sides=(t.roster_ids||[]).map(rid=>{
        const team=teams.find(tm=>tm.roster_id===rid);
        const adds=Object.entries(t.adds||{}).filter(([,r])=>r===rid).map(([id])=>id);
        const drops=Object.entries(t.drops||{}).filter(([,r])=>r===rid).map(([id])=>id);
        const addPks=(t.draft_picks||[]).filter(pk=>pk.owner_id===rid&&pk.previous_owner_id!==rid);
        const dropPks=(t.draft_picks||[]).filter(pk=>pk.previous_owner_id===rid&&pk.owner_id!==rid);
        const addV=adds.reduce((s,id)=>s+playerVal(id),0)+addPks.reduce((s,pk)=>s+pickVal(pk),0);
        const dropV=drops.reduce((s,id)=>s+playerVal(id),0)+dropPks.reduce((s,pk)=>s+pickVal(pk),0);
        return{team,rid,
          addedP:adds.map(id=>PM[id]?.name||id),
          droppedP:drops.map(id=>PM[id]?.name||id),
          addedPks:addPks.map(pickLabel),
          droppedPks:dropPks.map(pickLabel),
          addV,dropV,net:addV-dropV};
      });
      const sorted=[...sides].sort((a,b)=>b.net-a.net);
      const winner=sorted[0],loser=sorted[1];
      const diff=Math.abs((winner?.net||0)-(loser?.net||0));
      const ref=Math.max(winner?.addV||1,500);
      const pct=Math.round(diff/ref*100);
      return{...t,sides,winner,loser,diff,pct,grade:gradeFor(pct)};
    });

    // Trade records
    const tradeRec={};
    for(const t of gradedTrades){
      for(const s of t.sides){
        const un=s.team?.username||'?';
        if(!tradeRec[un])tradeRec[un]={won:0,lost:0,vg:0,count:0,
          posFlow:{QB:0,RB:0,WR:0,TE:0},picksGiven:0,picksReceived:0,
          partners:{},weekDist:[]};
        const rec=tradeRec[un];
        rec.count++;
        if(s===t.winner){rec.won++;rec.vg+=t.diff;}
        else{rec.lost--;rec.vg-=t.diff;}
        // Pick flow
        rec.picksGiven+=s.droppedPks.length;
        rec.picksReceived+=s.addedPks.length;
        // Pos flow (net)
        for(const nm of s.addedP){const p=Object.values(PM).find(x=>x.name===nm);if(p?.pos&&rec.posFlow[p.pos]!=null)rec.posFlow[p.pos]++;}
        for(const nm of s.droppedP){const p=Object.values(PM).find(x=>x.name===nm);if(p?.pos&&rec.posFlow[p.pos]!=null)rec.posFlow[p.pos]--;}
        // Partners
        for(const s2 of t.sides){if(s2!==s&&s2.team){const pun=s2.team.username;rec.partners[pun]=(rec.partners[pun]||0)+1;}}
        rec.weekDist.push(t.week);
      }
    }

    const softTargets=Object.entries(tradeRec)
      .filter(([,r])=>r.count>=1)
      .map(([un,r])=>({un,...r,score:Math.max(0,r.lost)*2-r.won+(r.vg<0?Math.abs(r.vg/400):0)}))
      .sort((a,b)=>b.score-a.score);

    upLoad('WAR ROOM READY',100);
    await sleep(400);

    LD={league,isSF,teams,users,userMap,myUID,
        gradedTrades,tradeRec,softTargets,waiverAct,leagueChain};

    // Show top bar
    const me=teams.find(t=>t.isMe);
    document.getElementById('topBar').style.display='flex';
    document.getElementById('topBar').className='top-bar';
    document.getElementById('topBar').innerHTML=`
      <div class="tb-lg">${league.name||'League'}</div>
      <span class="tb-b b-t">${league.total_rosters||12} TEAMS</span>
      <span class="tb-b ${isSF?'b-t':'b-p'}">${isSF?'SF PPR':'1QB PPR'}</span>
      <span class="tb-b b-g">${gradedTrades.length} TRADES · ${leagueChain.length} SEASONS</span>
      <div class="tb-right">
        ${me?`<span class="my-badge">⭐ @${me.username}</span>`:''}
        <button onclick="reset()" style="padding:4px 10px;background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer">CHANGE</button>
      </div>`;

    // Show my position grades
    if(me){
      document.getElementById('myStatsRow').style.display='flex';
      document.getElementById('myStatsRow').className='my-stats-row';
      const gradeHtml=Object.entries(me.posGrades).map(([pos,g])=>{
        const v=me.posVal[pos];
        const rank=teams.filter(t=>!t.isMe).filter(t=>t.posVal[pos]>v).length+1;
        const ltr=g==='strong'?'A+':g==='ok'?'B+':'C+';
        const cls=g==='strong'?'pg-A':g==='ok'?'pg-B':'pg-C';
        return`<span class="pos-grade ${cls}">${pos} ${ltr} #${rank}</span>`;
      }).join('');
      document.getElementById('myStatsRow').innerHTML=`
        <div class="msr-label">YOU</div>${gradeHtml}`;
    }

    document.getElementById('tabsBar').style.display='flex';
    setTab('warroom',document.querySelector('.tab-btn'));
    ACTIVE_MGR=null;

  }catch(e){
    console.error(e);
    document.getElementById('content').innerHTML=`<div class="empty">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--txt2);margin-bottom:8px">ERROR</div>
      <p>${e.message}</p>
      <button onclick="reset()" style="margin-top:16px;padding:8px 20px;background:var(--teal);color:#000;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer">TRY AGAIN</button>
    </div>`;
  }
  document.getElementById('sb').disabled=false;
  document.getElementById('sb').textContent='ANALYZE →';
}

function reset(){
  ['tabsBar','topBar','myStatsRow'].forEach(id=>{document.getElementById(id).style.display='none';});
  document.getElementById('content').innerHTML='';
  document.getElementById('heroSection').style.display='flex';
  document.getElementById('searchForm').style.display='flex';
  document.getElementById('leaguePicker').style.display='none';
  window.scrollTo(0,0);
}

// ── TABS ──
function setTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const el=document.getElementById('content');
  if(tab==='warroom')el.innerHTML=renderWarRoom();
  else if(tab==='needs')el.innerHTML=renderNeeds();
  else if(tab==='trades'){SEASON_FILTER='all';el.innerHTML=renderTrades();}
  else if(tab==='targets')el.innerHTML=renderTargets();
  else if(tab==='timing')el.innerHTML=renderTiming();
  if(tab==='warroom'&&ACTIVE_MGR)setTimeout(()=>selectMgr(ACTIVE_MGR),50);
}

// ── WAR ROOM ──
function renderWarRoom(){
  const{teams,tradeRec,waiverAct}=LD;
  const me=teams.find(t=>t.isMe);

  // Score each opponent as trade partner
  const scored=teams.filter(t=>!t.isMe).map(t=>{
    let score=0,reasons=[];
    if(me){
      for(const pos of['QB','RB','WR','TE']){
        if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak'){score+=3;reasons.push(`sell ${pos}`);}
        if(me.posGrades[pos]==='weak'&&t.posGrades[pos]==='strong'){score+=3;reasons.push(`buy ${pos}`);}
        if(me.posGrades[pos]==='ok'&&t.posGrades[pos]==='weak'){score+=1;}
      }
      if(me.win.w==='CONTENDING'&&t.win.w==='REBUILDING')score+=2;
      if(me.win.w==='REBUILDING'&&t.win.w==='CONTENDING')score+=2;
    }
    return{t,score,reasons};
  }).sort((a,b)=>b.score-a.score);

  // League intelligence chips
  const totalTrades=LD.gradedTrades.length;
  const teamsCount=teams.length;
  const tradesPerTeam=(totalTrades/teamsCount).toFixed(1);
  const pickHoarders=teams.filter(t=>(t.players||[]).length<0).length; // placeholder
  const highPickTeams=0; // todo

  // Group managers
  const prime=scored.filter(s=>s.score>=5);
  const worth=scored.filter(s=>s.score>=2&&s.score<5);
  const low=scored.filter(s=>s.score<2);

  function mgrItem(s,idx){
    const{t}=s;
    const tr=tradeRec[t.username]||{count:0,won:0,lost:0};
    const wc=waiverAct[t.roster_id]||0;
    const act=(tr.count||0)+(wc||0);
    const grades=Object.entries(t.posGrades).map(([pos,g])=>{
      const v=t.posVal[pos];
      const rank=teams.filter(x=>x.posVal[pos]>v).length+1;
      const ltr=g==='strong'?'A+':g==='ok'?'B+':'C';
      const cls=g==='strong'?'mg-A':g==='ok'?'mg-B':'mg-C';
      return`<span class="mg ${cls}">${pos} ${ltr}</span>`;
    }).join('');
    const scoreColor=s.score>=5?'var(--green)':s.score>=2?'var(--teal)':'var(--txt3)';
    const scoreBg=s.score>=5?'rgba(0,230,118,0.12)':s.score>=2?'rgba(0,212,255,0.08)':'rgba(139,164,192,0.06)';
    const desc=s.reasons.length?s.reasons.slice(0,2).join(', '):
      `${t.win.w.toLowerCase()} · ${act} activity`;
    return`<div class="mgr-item${t.isMe?' is-me':''}" id="mi-${t.roster_id}" onclick="selectMgr('${t.roster_id}')">
      <div class="mi-score" style="background:${scoreBg};color:${scoreColor}">${s.score||'—'}</div>
      <div class="mi-body">
        <div class="mi-name">${t.username}${t.isMe?' ⭐':''}</div>
        <div class="mi-desc">${desc}</div>
        <div class="mi-grades">${grades}<span class="mi-intel">&nbsp;${tr.count} intel</span></div>
      </div>
    </div>`;
  }

  function selfScout(){
    if(!me)return'';
    const tr=tradeRec[me.username]||{count:0};
    const wc=waiverAct[me.roster_id]||0;
    const scores=scored.find(s=>false)||{score:0,reasons:[]};
    return`<div class="mgr-section">
      <div class="mgr-section-title" style="color:var(--purple)">🛡 SELF SCOUT</div>
      <div class="mgr-item is-me" id="mi-${me.roster_id}" onclick="selectMgr('${me.roster_id}')">
        <div class="mi-score" style="background:rgba(155,109,255,0.12);color:var(--purple)">YOU</div>
        <div class="mi-body">
          <div class="mi-name">${me.username} ⭐</div>
          <div class="mi-desc">${me.win.w} · ${tr.count} trades · ${wc} waivers</div>

  <div style="display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--bdr);background:var(--s1);flex-wrap:wrap">
    <div style="padding:6px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;font-size:12px;color:var(--txt2)">
      ⚡ <strong style="color:var(--txt)">Active league</strong> — ${tradesPerTeam} trades per team average
    </div>
    ${teams.filter(t=>t.win.w==='REBUILDING').length>0?`<div style="padding:6px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;font-size:12px;color:var(--txt2)">

function setWRFilter(f){
  WR_FILTER=f;
  // Re-render and re-apply filter visually
  document.getElementById('content').innerHTML=renderWarRoom();
  if(ACTIVE_MGR)setTimeout(()=>selectMgr(ACTIVE_MGR),50);
  // Apply filter to left panel
  applyFilter();
}

function applyFilter(){
  if(WR_FILTER==='all')return;
  const{teams}=LD;
  document.querySelectorAll('.mgr-item').forEach(el=>{
    const rid=el.id.replace('mi-','');
    const team=teams.find(t=>String(t.roster_id)===rid);
    if(!team){el.style.opacity='1';return;}
    let show=true;
    if(WR_FILTER==='TE')show=team.posGrades.TE==='weak';
    else if(WR_FILTER==='RB')show=team.posGrades.RB==='weak';
    else if(WR_FILTER==='WR')show=team.posGrades.WR==='weak';
    else if(WR_FILTER==='QB')show=team.posGrades.QB==='weak';
    else if(WR_FILTER==='rebuild')show=team.win.w==='REBUILDING'||team.win.w==='DECLINING';
    else if(WR_FILTER==='contend')show=team.win.w==='CONTENDING'||team.win.w==='PEAKING';
    el.style.opacity=show?'1':'0.25';
  });
}

// ── SELECT MANAGER → INTEL PANEL ──
function selectMgr(rosterId){
  ACTIVE_MGR=rosterId;
  document.querySelectorAll('.mgr-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('mi-'+rosterId);
  if(el)el.classList.add('active');

  const{teams,tradeRec,waiverAct,gradedTrades,isSF}=LD;
  const t=teams.find(t=>String(t.roster_id)===String(rosterId));
  if(!t){return;}

  const tr=tradeRec[t.username]||{count:0,won:0,lost:0,vg:0,posFlow:{},picksGiven:0,picksReceived:0,partners:{},weekDist:[]};
  const wc=waiverAct[t.roster_id]||0;
  const me=teams.find(tm=>tm.isMe);

  // Build "your play" based on their biggest need vs your strength
  let yourPlay='Explore trade conversations';
  if(me){
    for(const pos of['QB','RB','WR','TE']){
      if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak'){
        yourPlay=`Sell ${pos} depth into their critical need`;break;
      }
    }
    if(t.win.w==='REBUILDING'&&me.win.w==='CONTENDING')yourPlay='Buy youth/picks — they\'re selling for the future';
    if(t.win.w==='CONTENDING'&&me.win.w==='REBUILDING')yourPlay='Sell win-now veterans for picks/youth';
  }

  // Position ranks in league
  const posRanks={};
  for(const pos of['QB','RB','WR','TE']){
    const rank=teams.filter(x=>x.posVal[pos]>t.posVal[pos]).length+1;
    posRanks[pos]=rank;
  }

  // Pos flow text
  const flowItems=Object.entries(tr.posFlow||{}).filter(([,v])=>Math.abs(v)>=2)
    .map(([pos,v])=>v<0?`${pos} Disposer — net ${v} flow`:`${pos} Acquirer — net +${v} flow`);

  // Top trade partner
  const topPartner=Object.entries(tr.partners||{}).sort((a,b)=>b[1]-a[1])[0];

  // Pick intel
  const extraPicks=Math.max(0,Object.values(tr.picksReceived||0)-Object.values(tr.picksGiven||0));

  // Activity level
  const totalAct=(tr.count||0)+(wc||0);
  const leagueAvgAct=LD.teams.reduce((s,tm)=>{
    const r=LD.tradeRec[tm.username]||{count:0};
    return s+(r.count||0)+(LD.waiverAct[tm.roster_id]||0);
  },0)/LD.teams.length;
  const actVsAvg=leagueAvgAct>0?Math.round(((totalAct/leagueAvgAct)-1)*100):0;
  const actRank=LD.teams.filter(tm=>{
    const r=LD.tradeRec[tm.username]||{count:0};
    return((r.count||0)+(LD.waiverAct[tm.roster_id]||0))>(tr.count||0)+(wc||0);
  }).length+1;

  // Build intel cards
  const needCards=[];
  // Roster holes
  for(const pos of['QB','RB','WR','TE']){
    if(t.posGrades[pos]==='weak'){
      const best=t.byPos[pos][0];
      needCards.push({
        icon:'🚨',tags:['roster','this-league','strong'],
        title:`Desperate for ${pos} (ranked #${posRanks[pos]} of ${LD.teams.length})`,
        desc:`Best ${pos}: ${best?best.name+' ('+best.value.toLocaleString()+')':'none'}. Critical hole — they should be willing to overpay.`
      });
    }else if(t.posGrades[pos]==='ok'){
      needCards.push({
        icon:'⚠️',tags:['roster','this-league'],
        title:`${pos} is thin (ranked #${posRanks[pos]} of ${LD.teams.length})`,
        desc:`Starter-level ${pos} but no real depth. An upgrade offer could get traction.`
      });
    }
  }
  // Pick surplus
  if(tr.picksReceived>tr.picksGiven+2){
    needCards.push({
      icon:'🎟️',tags:['pick','this-league','strong'],
      title:`Sitting on ${tr.picksReceived-tr.picksGiven} extra picks`,
      desc:`Must sell picks before the draft or waste roster spots. Any offer involving a quality player for picks will get serious consideration.`
    });
  }
  if(tr.picksGiven>tr.picksReceived+2){
    needCards.push({
      icon:'📭',tags:['pick','this-league','strong'],
      title:`Missing picks — gave away ${tr.picksGiven} across ${tr.count} trades`,
      desc:`No rebuild path if their window closes. Capital-poor.`
    });
  }

  // Trade intel cards
  const tradeCards=[];
  if(flowItems.length){
    for(const fi of flowItems){
      tradeCards.push({icon:'🎯',tags:['trade-bias','this-league','strong'],title:fi,
        desc:`Used as trade fuel — offers involving this position typically get accepted.`});
    }
  }
  if(topPartner&&topPartner[1]>=3){
    tradeCards.push({icon:'🤝',tags:['relationship','this-league','strong'],
      title:`Trades with ${topPartner[0]} frequently (${topPartner[1]} times)`,
      desc:`Established relationship. You may be able to disrupt this by undercutting their usual partner's offers.`});
  }
  if(tr.picksGiven>3){
    tradeCards.push({icon:'🎟️',tags:['pick-intel','this-league','strong'],
      title:`Spends 1st-round picks freely (gave ${tr.picksGiven})`,
      desc:`Willing to part with premium capital. Given away ${tr.picksGiven} picks in ${tr.count} trades.`});
  }
  // Activity
  const actLabel=actVsAvg>50?'Most active trader':`#${actRank} of ${LD.teams.length} in activity`;
  tradeCards.push({icon:'⚡',tags:['trade-style','this-league','strong'],
    title:`${actLabel} — ${tr.count} deals (${(tr.count/Math.max(1,LD.leagueChain.length)).toFixed(1)}/yr)`,
    desc:`${actVsAvg>0?`Top ${100-Math.min(99,actVsAvg)}% of the league by trade volume (+${actVsAvg}% vs league avg). High engagement. Will respond to offers and negotiate aggressively.`:'Below average trade activity. May need extra convincing or a very favorable offer to engage.'}`});

  // Week distribution
  if(tr.weekDist&&tr.weekDist.length>0){
    const avgWk=tr.weekDist.reduce((s,w)=>s+w,0)/tr.weekDist.length;
    const timing=avgWk<8?'trades early in season':'trades spread across the year';
    tradeCards.push({icon:'🕐',tags:['trade-timing','this-league','strong'],
      title:`Trades spread across year — ${timing}`,
      desc:`Time your offers for when they're most engaged.`});
  }

  // Day of week (placeholder)
  tradeCards.push({icon:'ℹ️',tags:['note','this-league'],
    title:`Most active on weekdays`,
    desc:`Based on transaction timestamps — send offers Monday-Thursday for fastest response.`});

  function renderCards(cards){
    return cards.map(c=>{
      const tagHtml=c.tags.map(tg=>{
        const cls=tg==='roster'?'tag-roster':tg==='pick'||tg==='pick-intel'?'tag-pick':
          tg==='trade-bias'||tg==='trade-style'?'tag-trade':tg==='relationship'?'tag-rel':
          tg==='strong'?'tag-strong':'tag-league';
        const lbl=tg==='this-league'?'THIS LEAGUE':tg==='strong'?'STRONG SIGNAL':
          tg==='roster'?'ROSTER HOLE':tg==='pick'||tg==='pick-intel'?'PICK INTEL':
          tg==='trade-bias'?'TRADE BIAS':tg==='relationship'?'TRADE RELATIONSHIP':
          tg==='trade-style'?'TRADE STYLE':tg==='trade-timing'?'TRADE TIMING':'NOTE';
        return`<span class="ic-tag ${cls}">${lbl}</span>`;
      }).join('');
      return`<div class="intel-card"><div class="ic-icon">${c.icon}</div>
        <div class="ic-body">
          <div class="ic-tags">${tagHtml}</div>
          <div class="ic-title">${c.title}</div>
          <div class="ic-desc">${c.desc}</div>
        </div></div>`;
    }).join('');
  }

  const winScore=me?scored_for(t,me):0;
  const scoreColor=winScore>=5?'var(--green)':winScore>=2?'var(--teal)':'var(--txt3)';

  const panel=`<div class="intel-panel">
    <div class="ip-header">
      <div class="ip-av">${t.avatar?`<img src="${t.avatar}" onerror="this.outerHTML='🏈'">`:'🏈'}</div>
      <div style="flex:1">
        <div class="ip-name">${t.username}${t.isMe?' ⭐':''}</div>
        <div class="ip-meta">${t.win.w} · ${t.wins}W-${t.losses}L · Avg age ${t.avgAge.toFixed(1)}</div>
        <div class="ip-grades">
          ${Object.entries(t.posGrades).map(([pos,g])=>{
            const cls=g==='strong'?'pg-A':g==='ok'?'pg-B':'pg-C';
            const ltr=g==='strong'?'A+':g==='ok'?'B+':'C';
            return`<span class="ip-grade ${cls}">${pos} ${ltr}</span>`;
          }).join('')}
          <span style="padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:11px;background:rgba(155,109,255,0.12);color:var(--purple);border:1px solid rgba(155,109,255,0.2)">${t.win.w}</span>
        </div>
      </div>
      <div class="ip-score">
        <div class="ip-score-val" style="color:${scoreColor}">${winScore}</div>
        <div class="ip-score-lbl">MATCH SCORE</div>
      </div>
    </div>

    ${!t.isMe?`<div class="your-play">
      <div class="yp-icon">🎯</div>
      <div>
        <div class="yp-label">YOUR PLAY</div>
        <div class="yp-text">${yourPlay}</div>
      </div>
    </div>`:''}

    <div class="intel-section">
      <div class="is-header">
        <div class="is-title">WHAT THEY NEED</div>
        <div class="is-count">${needCards.length} insights ▲</div>
      </div>
      <div class="intel-cards">${needCards.length?renderCards(needCards):'<div class="empty" style="padding:16px">Roster appears well-balanced</div>'}</div>
    </div>

    <div class="intel-section">
      <div class="is-header">
        <div class="is-title">HOW THEY TRADE</div>
        <div class="is-count">${tradeCards.length} insights ▲</div>
      </div>
      <div class="intel-cards">${renderCards(tradeCards)}</div>
    </div>

    <div class="coach-cta">
      <div class="cta-row">
        <div class="cta-icon">🤖</div>
        <div>
          <div class="cta-title">THE COACH KNOWS EVERYTHING ${t.username.toUpperCase()} DOES</div>
          <div class="cta-body">Not just this league — every Sleeper league they play in. Every trade, every waiver, every roster decision. Ask The Coach exactly how to get a deal done with @${t.username}.</div>
        </div>
        <a href="/coach.html" class="cta-btn">ASK →</a>
      </div>
    </div>
  </div>`;

  const right=document.getElementById('wrRight');
  if(right)right.innerHTML=panel;
}

function scored_for(t,me){
  let score=0;
  for(const pos of['QB','RB','WR','TE']){
    if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak')score+=3;
    if(me.posGrades[pos]==='weak'&&t.posGrades[pos]==='strong')score+=3;
    if(me.posGrades[pos]==='ok'&&t.posGrades[pos]==='weak')score+=1;
  }
  if(me.win.w==='CONTENDING'&&t.win.w==='REBUILDING')score+=2;
  if(me.win.w==='REBUILDING'&&t.win.w==='CONTENDING')score+=2;
  return score;
}

// ── TRADES ──
function renderTrades(){
  const{gradedTrades,leagueChain}=LD;
  const seasons=[...new Set(gradedTrades.map(t=>t.season||2025))].sort((a,b)=>b-a);
  let trades=SEASON_FILTER==='all'?gradedTrades:gradedTrades.filter(t=>(t.season||2025)==SEASON_FILTER);

  const filterHtml=`<div class="trades-filter">
    <button class="tf ${SEASON_FILTER==='all'?'active':''}" onclick="SEASON_FILTER='all';document.getElementById('content').innerHTML=renderTrades()">ALL TIME (${gradedTrades.length})</button>
    ${seasons.map(s=>`<button class="tf ${SEASON_FILTER==s?'active':''}" onclick="SEASON_FILTER=${s};document.getElementById('content').innerHTML=renderTrades()">${s} (${gradedTrades.filter(t=>(t.season||2025)==s).length})</button>`).join('')}
  </div>`;

  const tHtml=trades.map(t=>{
    const[a,b]=t.sides||[];
    if(!a||!b)return'';
    const wA=a===t.winner;
    const ra=(side)=>[
      ...side.addedP.map(n=>`<span class="asset">${n}</span>`),
      ...side.addedPks.map(pk=>`<span class="asset pick-asset">📋 ${pk}</span>`)
    ].join('')||`<span class="asset" style="color:var(--txt3)">—</span>`;
    return`<div class="trade-card">
      <div class="tc-head">
        <div class="tc-wk">${t.season||2025} WK ${t.week||'?'}</div>
        <div class="tc-teams">${a.team?.username||'?'} ↔ ${b.team?.username||'?'}</div>
        <span class="tc-grade tg-${t.grade}">${t.grade}</span>
      </div>
      <div class="tc-body">
        <div class="tc-side ${wA?'w':'l'}"><strong>${a.team?.username||'?'} received:</strong>${ra(a)}</div>
        <div><div class="tc-vs">VS</div><div class="tc-pct" style="color:${t.pct>25?'var(--red)':'var(--gold)'}">±${t.pct}%</div></div>
        <div class="tc-side ${!wA?'w':'l'}" style="text-align:right"><strong>${b.team?.username||'?'} received:</strong>${ra(b)}</div>
      </div>
    </div>`;
  }).join('');

  return`${filterHtml}<div class="trades-list">${tHtml||'<div class="empty">No trades found</div>'}</div>
  ${cta('Ask The Coach to analyze any trade and explain who won and why — with full historical context.')}`;
}

// ── MARKET TIMING ──
function renderTiming(){
  const{gradedTrades,teams}=LD;
  const tm={};
  for(const t of gradedTrades){
    for(const s of t.sides){
      const un=s.team?.username||'?';
      if(!tm[un])tm[un]={score:0,best:[],worst:[]};
      if(s===t.winner){tm[un].score+=t.pct;if(s.addedP.length)tm[un].best.push({a:s.addedP.slice(0,2),g:t.diff});}
      else{tm[un].score-=t.pct/2;if(s.droppedP.length)tm[un].worst.push({a:s.droppedP.slice(0,2),l:t.diff});}
    }
  }
  const sorted=Object.entries(tm).sort((a,b)=>b[1].score-a[1].score);
  const html=sorted.slice(0,10).map(([un,d],i)=>{
    const c=d.score>20?'var(--green)':d.score>0?'var(--teal)':d.score>-20?'var(--gold)':'var(--red)';
    const lbl=d.score>20?'ELITE':d.score>0?'GOOD':d.score>-20?'AVERAGE':'POOR';
    const isMe=teams.find(t=>t.isMe&&t.username===un);
    return`<div class="rank-card">
      <div class="rk-num">${i+1}</div>
      <div class="rk-info">
        <div class="rk-name">${un}${isMe?' ⭐':''} <span style="font-family:var(--mono);font-size:9px;color:var(--txt3)">${lbl} TIMING</span></div>
        <div class="rk-detail">
          ${d.best.slice(0,2).map(b=>`▲ Bought: ${b.a.join(', ')} <span style="color:var(--green)">+${b.g.toLocaleString()}</span>`).join(' · ')}
          ${d.worst.slice(0,1).map(w=>`▼ Gave up: ${w.a.join(', ')} <span style="color:var(--red)">-${w.l.toLocaleString()}</span>`).join('')}
        </div>
      </div>
      <div class="rk-score"><div class="rk-val" style="color:${c}">${Math.round(Math.abs(d.score))}</div><div class="rk-lbl">TIMING</div></div>
    </div>`;
  }).join('');
  return`<div class="rank-list">${html||'<div class="empty">Not enough trade history</div>'}</div>${cta('Ask The Coach who to target before their window closes — and who to sell to before they decline.')}`;
}

function cta(text){
  return`<div class="coach-cta">
    <div class="cta-row">
      <div class="cta-icon">🤖</div>
      <div style="flex:1"><div class="cta-title">THE COACH GOES DEEPER</div><div class="cta-body">${text}</div></div>
      <a href="/coach.html" class="cta-btn">ASK THE COACH →</a>
    </div>
  </div>`;
}

function showLoad(l,p){
  document.getElementById('heroSection').style.display='none';
  document.getElementById('content').innerHTML=`<div class="ls">
    <div class="ll">${l}</div>
    <div class="lb-wrap"><div class="lb" id="lb" style="width:${p}%"></div></div>
    <div class="lstep" id="lstep">CONNECTING TO SLEEPER...</div>
  </div>`;
}
function upLoad(s,p){
  const b=document.getElementById('lb'),st=document.getElementById('lstep');
  if(b)b.style.width=p+'%';
  if(st)st.textContent=s;
}

window.addEventListener('load',()=>{
  document.getElementById('uInput').focus();
  document.getElementById('uInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){const l=document.getElementById('lInput').value.trim();l?runScout(document.getElementById('uInput').value.trim(),l):go();}
  });
  document.getElementById('lInput').addEventListener('keydown',e=>{
    if(e.key==='Enter')go();
  });
});
</script>
</body>
</html>
