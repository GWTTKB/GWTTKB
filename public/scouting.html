<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWTTKB GM Scout — League War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080e;--s1:#090e18;--s2:#0d1420;--s3:#131d2e;--s4:#1a2640;
  --teal:#00d4ff;--teal2:#00f0ff;--green:#00e676;--gold:#ffb700;
  --red:#ff3d57;--orange:#ff8c00;--purple:#9b6dff;
  --txt:#e8f0fa;--txt2:#8ba4c0;--txt3:#4d6a8a;
  --bdr:rgba(0,212,255,0.10);--bdr2:rgba(0,212,255,0.22);
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 24px;background:rgba(5,8,14,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);gap:16px;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--teal);text-decoration:none;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);text-decoration:none;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--teal);}
.nav-spacer{flex:1;}
.nav-cta{padding:6px 16px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;text-decoration:none;border-radius:5px;}

/* HERO */
.hero{min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.015) 1px,transparent 1px);background-size:48px 48px;}
.hero::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:600px;height:260px;background:radial-gradient(ellipse,rgba(0,212,255,0.04),transparent 65%);pointer-events:none;}
.hero-eye{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--teal);margin-bottom:8px;position:relative;z-index:1;display:flex;align-items:center;gap:10px;}
.hero-eye::before{content:'';width:28px;height:1px;background:var(--teal);}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);letter-spacing:2px;text-align:center;margin-bottom:6px;position:relative;z-index:1;}
.hero-sub{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:22px;position:relative;z-index:1;}
.sf{display:flex;flex-direction:column;gap:8px;max-width:520px;width:100%;position:relative;z-index:1;}
.ir{display:flex;}
.si{flex:1;padding:12px 16px;background:var(--s1);border:1px solid var(--bdr2);border-right:none;border-radius:10px 0 0 10px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s;}
.si:focus{border-color:var(--teal);}
.si::placeholder{color:var(--txt3);}
.si2{max-width:160px;border-radius:0;border-left:1px solid var(--bdr2);border-right:none;}
.sb{padding:12px 22px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;border:none;border-radius:0 10px 10px 0;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
.sb:hover{background:var(--teal2);}
.sb:disabled{background:var(--s3);color:var(--txt3);cursor:not-allowed;}
.sh{font-family:var(--mono);font-size:10px;color:var(--txt3);text-align:center;}

/* LEAGUE PICKER */
.lp{max-width:500px;width:100%;z-index:1;position:relative;margin-top:4px;}
.lp-lbl{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;margin-bottom:8px;text-align:center;}
.lp-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;}
.lp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.lp-item:hover{border-color:var(--teal);background:rgba(0,212,255,0.04);}
.lp-nm{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);flex:1;}
.lp-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.lp-badge{padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;}
.lp-sf{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.lp-qb{background:rgba(155,109,255,0.1);color:var(--purple);border:1px solid rgba(155,109,255,0.2);}

/* LOADING */
.lds{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:14px;}
.lbw{width:360px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;}
.lbar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--purple));transition:width 0.5s ease;}
.lbl{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--txt2);}
.lstp{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:2px;}

/* TOP BARS */
.top-bar{display:flex;align-items:center;gap:10px;padding:9px 20px;background:var(--s1);border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.tb-lg{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;}
.tbb{padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;}
.tbb-t{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.tbb-p{background:rgba(155,109,255,0.1);color:var(--purple);border:1px solid rgba(155,109,255,0.2);}
.tbb-g{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.my-badge{padding:4px 10px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--teal);letter-spacing:1px;}

/* MY STATS */
.my-stats{padding:8px 20px;background:var(--s2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ms-lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:1px;}
.pg{padding:3px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:700;}
.pg-A{background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.pg-B{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.pg-C{background:rgba(255,183,0,0.1);color:var(--gold);border:1px solid rgba(255,183,0,0.2);}
.pg-D{background:rgba(255,61,87,0.12);color:var(--red);border:1px solid rgba(255,61,87,0.2);}

/* MAIN TABS */
.main-tabs{position:sticky;top:52px;z-index:190;background:rgba(5,8,14,0.97);backdrop-filter:blur(20px);border-bottom:2px solid var(--bdr);padding:0 20px;display:flex;overflow-x:auto;}
.mt-btn{padding:13px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.mt-btn:hover{color:var(--txt2);}
.mt-btn.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ==================== WAR ROOM ==================== */
.wr-wrap{}
.wr-intel-bar{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--bdr);background:var(--s1);flex-wrap:wrap;}
.ib-chip{padding:5px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:5px;font-family:var(--mono);font-size:11px;color:var(--txt2);}
.ib-chip strong{color:var(--txt);}
.wr-filter{display:flex;gap:5px;padding:8px 20px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center;}
.wf{padding:4px 12px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;background:var(--s1);border:1px solid var(--bdr);border-radius:4px;color:var(--txt3);cursor:pointer;transition:all 0.12s;text-transform:uppercase;}
.wf.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,255,0.06);}
.wf-right{margin-left:auto;}

/* TWO PANEL */
.two-panel{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 220px);min-height:480px;}
.tp-left{border-right:1px solid var(--bdr);overflow-y:auto;background:var(--s1);}
.tp-right{overflow-y:auto;background:var(--bg);}

/* MANAGER LIST */
.mgr-section{padding:8px 10px 4px;}
.mgr-section-hd{display:flex;align-items:center;gap:8px;padding:6px 4px;margin-bottom:6px;}
.msh-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0;}
.msh-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;}
.mgr-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all 0.12s;margin-bottom:3px;border:1px solid transparent;}
.mgr-item:hover{background:var(--s2);border-color:var(--bdr);}
.mgr-item.active{background:rgba(0,212,255,0.06);border-color:rgba(0,212,255,0.2);}
.mgr-item.is-me{border-left:2px solid var(--teal);}
.mi-sc{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;flex-shrink:0;border:1px solid;}
.mi-body{flex:1;min-width:0;}
.mi-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);}
.mi-desc{font-size:10px;color:var(--txt3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);}
.mi-grades{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.mg{font-family:var(--mono);font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;border:1px solid;}

/* INTEL PANEL — Bloomberg style */
.intel-panel{padding:20px 24px 40px;}
.ip-hd{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr);}
.ip-av{width:48px;height:48px;border-radius:50%;background:var(--s3);flex-shrink:0;overflow:hidden;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:20px;}
.ip-av img{width:100%;height:100%;object-fit:cover;}
.ip-nm{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;}
.ip-sub{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:2px;}
.ip-pos-grades{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.ipg{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid;}
.ip-sc{margin-left:auto;text-align:center;flex-shrink:0;}
.ip-sc-val{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;}
.ip-sc-lbl{font-family:var(--mono);font-size:8px;color:var(--txt3);letter-spacing:2px;}

/* YOUR PLAY — Terminal style */
.your-play{border:1px solid var(--bdr2);border-left:3px solid var(--teal);background:rgba(0,212,255,0.03);padding:12px 16px;margin-bottom:18px;border-radius:0 6px 6px 0;}
.yp-label{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--teal);text-transform:uppercase;margin-bottom:4px;}
.yp-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--txt);}

/* INTEL SECTION */
.is-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);margin-bottom:10px;cursor:pointer;}
.is-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:3px;color:var(--txt2);text-transform:uppercase;}
.is-cnt{font-family:var(--mono);font-size:9px;color:var(--txt3);}
.ic-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}

/* INTEL CARD — Bloomberg Terminal no-emoji */
.ic{background:var(--s1);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px 10px 0;display:flex;gap:0;overflow:hidden;}
.ic-stripe{width:3px;flex-shrink:0;border-radius:3px 0 0 3px;}
.ic-content{flex:1;padding-left:12px;}
.ic-tags{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.ic-tag{padding:1px 6px;border-radius:2px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.tag-roster{background:rgba(255,61,87,0.12);color:var(--red);border:1px solid rgba(255,61,87,0.25);}
.tag-pick{background:rgba(155,109,255,0.12);color:var(--purple);border:1px solid rgba(155,109,255,0.25);}
.tag-trade{background:rgba(0,212,255,0.1);color:var(--teal);border:1px solid rgba(0,212,255,0.2);}
.tag-rel{background:rgba(255,183,0,0.1);color:var(--gold);border:1px solid rgba(255,183,0,0.2);}
.tag-style{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.18);}
.tag-league{background:rgba(139,164,192,0.08);color:var(--txt3);border:1px solid rgba(139,164,192,0.15);}
.tag-sig{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}
.tag-warn{background:rgba(255,183,0,0.1);color:var(--gold);border:1px solid rgba(255,183,0,0.2);}
.ic-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.ic-desc{font-size:12px;color:var(--txt2);line-height:1.5;}

/* ==================== TRADE GRADES / DRAFT GRADES sub-nav ==================== */
.sub-nav{display:flex;gap:0;padding:0 20px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:52px;z-index:180;}
.sn-btn{padding:10px 18px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.sn-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
.sn-btn:hover{color:var(--txt2);}

/* ==================== TRADE GRADES ==================== */
.tg-wrap{padding:20px 24px 60px;max-width:1300px;margin:0 auto;}
.sec-anchor{scroll-margin-top:130px;}
.sec-hd{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
.sec-hd::before{content:'';width:3px;height:22px;background:var(--teal);border-radius:2px;flex-shrink:0;}
.sec-sub{font-size:13px;color:var(--txt3);margin-bottom:16px;font-family:var(--mono);}

/* TRADE POWER RANKINGS TABLE */
.tpr-table{width:100%;border-collapse:collapse;margin-bottom:32px;}
.tpr-table th{padding:8px 12px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--bdr);text-align:left;background:var(--s1);}
.tpr-table th.r{text-align:right;}
.tpr-table td{padding:10px 12px;border-bottom:1px solid rgba(0,212,255,0.04);vertical-align:middle;}
.tpr-table tr{cursor:pointer;transition:background 0.1s;}
.tpr-table tr:hover td{background:rgba(0,212,255,0.02);}
.tpr-table tr.me-row td{background:rgba(0,212,255,0.025);}
.tpr-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--txt3);width:30px;text-align:center;}
.tpr-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;}
.tpr-trades{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal);text-align:right;}
.tpr-record{display:flex;align-items:center;gap:8px;}
.rec-bar{height:6px;border-radius:3px;background:var(--s3);width:120px;overflow:hidden;position:relative;}
.rec-bar-w{height:100%;background:var(--green);border-radius:3px 0 0 3px;}
.rec-bar-l{position:absolute;right:0;top:0;height:100%;background:var(--red);border-radius:0 3px 3px 0;}
.rec-text{font-family:var(--mono);font-size:10px;color:var(--txt3);white-space:nowrap;}
.tpr-winpct{font-family:'Bebas Neue',sans-serif;font-size:18px;text-align:right;}
.tpr-net{font-family:'Bebas Neue',sans-serif;font-size:18px;text-align:right;}
.net-pos{color:var(--green);}
.net-neg{color:var(--red);}
.style-badge{padding:3px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;}
.style-shark{background:rgba(255,61,87,0.15);color:var(--red);border:1px solid rgba(255,61,87,0.3);}
.style-balanced{color:var(--txt3);border:1px solid var(--bdr);}
.style-overpay{background:rgba(155,109,255,0.12);color:var(--purple);border:1px solid rgba(155,109,255,0.25);}
.style-builder{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.2);}

/* MANAGER EXPAND ROW */
.expand-row td{padding:0!important;background:var(--s2)!important;}
.expand-inner{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;border-bottom:1px solid var(--bdr);}
.ei-section{}
.ei-title{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px;}
.pos-flow{display:flex;flex-direction:column;gap:4px;}
.pf-row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;}
.pf-pos{width:24px;color:var(--txt3);}
.pf-bar-wrap{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:visible;position:relative;}
.pf-bar-pos{height:4px;background:var(--green);border-radius:2px;}
.pf-bar-neg{height:4px;background:var(--red);border-radius:2px;}
.pf-val{width:28px;text-align:right;}
.qs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qs-item{}
.qs-val{font-family:'Bebas Neue',sans-serif;font-size:20px;}
.qs-lbl{font-family:var(--mono);font-size:8px;color:var(--txt3);letter-spacing:1px;}
.never-traded{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:8px;}
.never-traded span{color:var(--red);}

/* ALL TRADES */
.trades-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.tf{padding:4px 12px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;background:var(--s1);border:1px solid var(--bdr);border-radius:4px;color:var(--txt3);cursor:pointer;transition:all 0.12s;text-transform:uppercase;}
.tf.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,255,0.06);}
.tf-search{flex:1;max-width:280px;padding:5px 12px;background:var(--s1);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-family:var(--mono);font-size:11px;outline:none;}
.tf-search:focus{border-color:var(--teal);}
.tf-search::placeholder{color:var(--txt3);}
.trades-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;}
.trade-card{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;transition:border-color 0.12s;}
.trade-card:hover{border-color:var(--bdr2);}
.tc-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--bdr);}
.tc-date{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.tc-winner{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:2px;}
.tc-moved{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-left:auto;}

<script>
const API='https://api.sleeper.app/v1';
const S=ms=>new Promise(r=>setTimeout(r,ms));
let LD=null,PM={},CSF={},C1QB={};
let ACTIVE_MGR=null,EXPANDED_TRADE_MGR=null;
// Historical values
let HIST=null;        // full historical JSON
let HIST_DATES=[];    // sorted date strings
let HIST_PLAYERS={};  // sleeper_id → {dates[], sf_vals[], qb_vals[]}
let HIST_PICKS={};    // normalized label → {dates[], sf_vals[], qb_vals[]}
let TRADED_PICKS={};  // leagueId+season+round+roster_id → pick_no
let HIST_LOADED=false;
let TRADE_SEASON='all',TRADE_SEARCH='',WR_FILTER='all';
let DRAFT_VIEW='leaderboard',DRAFT_SEASON='all',DRAFT_MGR=null;
let ALL_DRAFTS=[];

function n(s){return String(s).toLowerCase().replace(/[^a-z0-9]/g,'');}
async function g(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json();}

// ── PICK SLOT LOOKUP — built from actual completed draft data ──
// DRAFT_SLOTS[season][round][roster_id] = pick_no
const DRAFT_SLOTS={};

// Pick → Player map: what player was taken with a specific pick
// Key: "season_round_slot" → {playerId, name, draftDate, draftedBy}
const PICK_TO_PLAYER={};

function buildDraftSlots(){
  // Build from ALL_DRAFTS — most reliable source (actual completed drafts)
  for(const draft of ALL_DRAFTS){
    const yr=String(draft.season||'');
    const draftDate=draft.start_time?new Date(draft.start_time).toISOString().slice(0,10):null;
    if(!DRAFT_SLOTS[yr])DRAFT_SLOTS[yr]={};
    for(const pick of draft.picks||[]){
      const rd=String(pick.round||'');
      const slot=pick.pick_no||pick.draft_slot;
      const rid=String(pick.roster_id||'');
      if(slot&&rd){
        // Slot lookup
        if(!DRAFT_SLOTS[yr][rd])DRAFT_SLOTS[yr][rd]={};
        if(rid)DRAFT_SLOTS[yr][rd][rid]=slot;

        // Pick→Player lookup
        if(pick.player_id){
          const p=PM[pick.player_id]||{};
          const key=`${yr}_${rd}_${slot}`;
          PICK_TO_PLAYER[key]={
            playerId:pick.player_id,
            name:p.name||pick.player_id,
            pos:p.pos||'?',
            draftDate,
            slot,round:parseInt(rd),season:parseInt(yr)
          };
        }
      }
    }
  }
  // Supplement with traded_picks data
  for(const[key,slot]of Object.entries(TRADED_PICKS)){
    // key formats: "lgId_season_round_rid" or "season_round_rid"
    const parts=key.split('_');
    if(parts.length>=3){
      const yr=parts[parts.length-3];
      const rd=parts[parts.length-2];
      const rid=parts[parts.length-1];
      if(yr&&rd&&rid&&!rid.startsWith('own')&&!rid.startsWith('prev')){
        if(!DRAFT_SLOTS[yr])DRAFT_SLOTS[yr]={};
        if(!DRAFT_SLOTS[yr][rd])DRAFT_SLOTS[yr][rd]={};
        if(!DRAFT_SLOTS[yr][rd][rid])DRAFT_SLOTS[yr][rd][rid]=slot;
      }
    }
  }
  console.log('Draft slots built:',Object.keys(DRAFT_SLOTS).map(yr=>`${yr}:${Object.values(DRAFT_SLOTS[yr]).reduce((s,r)=>s+Object.keys(r).length,0)}`).join(', '));
}

// Get current consensus value for a pick label using real historical data
function pickConsensusVal(label){
  if(!label||label==='?')return 0;
  if(HIST_LOADED){
    const v=getPickHistVal(label, todayStr());
    if(v>0)return v;
  }
  return PV({season:parseInt(label),round:parseInt(label.match(/\d+/g)?.[1]||'1')},null);
}

// Round number to name
function rdName(rd){
  const r=parseInt(rd);
  return r===1?'1st':r===2?'2nd':r===3?'3rd':`${r}th`;
}

// ── PICK LABEL: "2026 2.04" if known, "2026 2nd" if unknown ──
function PL(pk,leagueId){
  if(!pk)return'?';
  const yr=String(pk.season||pk.year||'?');
  const rd=parseInt(pk.round||1);
  const rid=String(pk.roster_id||'');
  const prevId=String(pk.previous_owner_id||'');

  // Try 1: direct pick_no on the transaction pick object
  let slot=pk.pick_no!=null?pk.pick_no:null;

  // Try 2: look up in DRAFT_SLOTS (built from actual completed drafts)
  if(slot==null){
    const slots=DRAFT_SLOTS[yr]?.[String(rd)];
    if(slots){
      slot=slots[rid]??slots[prevId]??null;
      // Also try numeric versions
      if(slot==null){
        for(const[k,v]of Object.entries(slots)){
          if(String(k)===rid||String(k)===prevId){slot=v;break;}
        }
      }
    }
  }

  // Try 3: traded_picks map (for picks not in completed drafts)
  if(slot==null){
    for(const k of[
      `${leagueId}_${yr}_${rd}_${rid}`,
      `${yr}_${rd}_${rid}`,
      `${yr}_${rd}_${prevId}`,
    ]){
      if(k&&TRADED_PICKS[k]!=null){slot=TRADED_PICKS[k];break;}
    }
  }

  // Known slot: "2026 2.04"
  if(slot!=null)return`${yr} ${rd}.${String(slot).padStart(2,'0')}`;

  // Unknown slot: show round name
  return`${yr} ${rdName(rd)}`;
}

// Pick value: historical value on a specific date, or formula fallback
function PV(pk, dateStr){
  const yr=parseInt(pk.season||pk.year||2025);
  const rd=parseInt(pk.round||1);
  const slot=pk.pick_no;
  // Try historical lookup
  if(HIST_LOADED&&dateStr){
    const label=pickHistLabel(yr,rd,slot);
    const hv=getPickHistVal(label,dateStr);
    if(hv>0)return hv;
  }
  // Formula fallback
  const base=rd===1?7000:rd===2?3800:rd===3?2200:1400;
  const sm=slot?(1+((16-slot)/16)*0.45):1;
  const ym=yr<=2025?1:yr===2026?0.84:0.70;
  return Math.round(base*sm*ym);
}

// Current pick value (today)
function PVcurrent(pk){
  if(HIST_LOADED){
    const yr=parseInt(pk.season||pk.year||2025);
    const rd=parseInt(pk.round||1);
    const slot=pk.pick_no;
    const label=pickHistLabel(yr,rd,slot);
    const today=todayStr();
    const hv=getPickHistVal(label,today);
    if(hv>0)return hv;
  }
  return PV(pk,null);
}

function todayStr(){return new Date().toISOString().slice(0,10);}

function pickHistLabel(yr,rd,slot){
  // Match the CSV pick labels: "Early 1st 2026", "Mid 2nd 2025" etc
  const rdStr=rd===1?'1st':rd===2?'2nd':rd===3?'3rd':`${rd}th`;
  if(slot!=null){
    const tier=slot<=4?'Early':slot<=8?'Mid':'Late';
    return`${tier} ${rdStr} ${yr}`;
  }
  return`${rdStr} ${yr}`; // fallback without tier
}

function pv(id){
  const p=PM[id];if(!p)return 0;
  return LD?.isSF?(CSF[n(p.name||'')]||p.value||0):(C1QB[n(p.name||'')]||p.value||0);
}

function grade(pct){return pct<=5?'A':pct<=15?'B':pct<=30?'C':pct<=50?'D':'F';}
function fmtK(v){const av=Math.abs(v);return av>=1000?(v>0?'+':'-')+(av/1000).toFixed(1)+'k':(v>0?'+':'')+Math.round(v);}

// Slot value for draft picks at time of draft
function slotVal(round,pick){
  const base=[7000,6200,5500,4800,4200,3700,3200,2800,2400,2000,1700,1400];
  if(round===1)return base[Math.min(pick-1,11)]||1200;
  if(round===2)return Math.max(400,1200-((pick-1)*60));
  if(round===3)return Math.max(200,600-((pick-1)*30));
  return Math.max(100,300-((pick-1)*15));
}

function draftGrade(surplus){
  if(surplus>3000)return{g:'A+',c:'gb-Ap'};
  if(surplus>1500)return{g:'A',c:'gb-A'};
  if(surplus>500)return{g:'B+',c:'gb-Bp'};
  if(surplus>0)return{g:'B',c:'gb-B'};
  if(surplus>-500)return{g:'C+',c:'gb-Cp'};
  if(surplus>-1500)return{g:'C',c:'gb-C'};
  if(surplus>-3000)return{g:'C-',c:'gb-Cm'};
  return{g:'D',c:'gb-D'};
}

function win(total,avgAge){
  if(total>58000&&avgAge<26.5)return{w:'CONTENDING',c:'var(--green)'};
  if(total>50000&&avgAge>=28)return{w:'PEAKING',c:'var(--gold)'};
  if(total>42000&&avgAge<28)return{w:'COMPETING',c:'var(--teal)'};
  if(total<28000&&avgAge<26)return{w:'REBUILDING',c:'var(--purple)'};
  if(total<28000&&avgAge>=28)return{w:'DECLINING',c:'var(--red)'};
  return{w:'MIDDLE',c:'var(--txt2)'};
}

async function loadConsensus(){
  try{
    const r=await fetch('/data/consensus.json');const d=await r.json();
    const sp=d.formats?.sf_ppr?.players||d.players||[];
    const qp=d.formats?.qb1_ppr?.players||[];
    for(const p of sp){
      CSF[n(p.name)]=p.value;
      if(p.id){PM[p.id]={name:p.name,pos:p.pos||p.position,team:p.team,age:p.age||0,
        value:p.value,hs:p.headshot_url||''};}
    }
    for(const p of qp)C1QB[n(p.name)]=p.value;
  }catch(e){console.warn('Consensus:',e);}
}

// ── LOAD HISTORICAL VALUES ──
async function loadHistoricalValues(){
  if(HIST_LOADED)return;
  try{
    // Load compact picks file (small) + players file in parallel
    const[picksRes,playersRes]=await Promise.all([
      fetch('/data/historical-picks.json'),
      fetch('/data/historical-players.json').catch(()=>null)
    ]);
    if(!picksRes.ok)throw new Error('Historical picks not found');
    const picksData=await picksRes.json();

    // Build pick lookup: "2026 Early 1st" → {dates[], sf[], qb[]}
    for(const[label,pk]of Object.entries(picksData.picks||{})){
      HIST_PICKS[label]=pk; // already in compact format
      // Also store normalized versions
      HIST_PICKS[label.toLowerCase().trim()]=pk;
    }

    // Load player historical values if available
    if(playersRes?.ok){
      const playersData=await playersRes.json();
      for(const[name,p]of Object.entries(playersData.players||{})){
        // Key by normalized name for lookup
        HIST_PLAYERS[norm(name)]=p;
      }
    }

    HIST_LOADED=true;
    console.log(`Historical loaded: ${Object.keys(HIST_PICKS).length} pick labels, ${Object.keys(HIST_PLAYERS).length} players`);
  }catch(e){
    console.warn('Historical values:',e.message);
    HIST_LOADED=false;
  }
}

// Get player value at a specific date by name (binary search)
function getHistVal(sleeperIDorName, dateStr, isSF){
  // Try by sleeper ID first, then by normalized name
  let p=HIST_PLAYERS[sleeperIDorName]||HIST_PLAYERS[norm(sleeperIDorName||'')];
  // If not found by ID, try by player name from PM
  if(!p&&PM[sleeperIDorName]){
    p=HIST_PLAYERS[norm(PM[sleeperIDorName].name||'')];
  }
  if(!p||!p.dates||!p.dates.length)return null;
  const vals=isSF?p.sf:p['1qb'];
  if(!vals)return null;
  // Binary search for closest date
  let lo=0,hi=p.dates.length-1,best=0;
  while(lo<=hi){
    const mid=Math.floor((lo+hi)/2);
    if(p.dates[mid]<=dateStr){best=mid;lo=mid+1;}
    else hi=mid-1;
  }
  return vals[best]??null;
}

// Get pick value at a specific date
// CSV format: "2026 Early 1st", "2026 Mid 2nd", "2026 Late 3rd"
function getPickHistVal(label, dateStr){
  if(!label||!HIST_LOADED)return 0;
  // Normalize label to CSV format
  const normalized=normPickLabel(label);
  const tryLabels=[label,normalized,label.toLowerCase()];
  // If label has slot number (e.g. "2026 2.04"), convert to tier
  const slotMatch=label.match(/(\d{4})\s+(\d+)\.(\d+)/);
  if(slotMatch){
    const yr=slotMatch[1],rd=parseInt(slotMatch[2]),slot=parseInt(slotMatch[3]);
    const rdStr=rd===1?'1st':rd===2?'2nd':rd===3?'3rd':`${rd}th`;
    const leagueSize=LD?.teams?.length||10;
    const tier=slot<=Math.ceil(leagueSize/3)?'Early':slot<=Math.ceil(leagueSize*2/3)?'Mid':'Late';
    tryLabels.push(`${yr} ${tier} ${rdStr}`);
  }
  for(const lbl of tryLabels){
    const pk=HIST_PICKS[lbl]||HIST_PICKS[lbl?.toLowerCase()];
    if(!pk||!pk.dates||!pk.dates.length)continue;
    const vals=LD?.isSF?pk.sf:pk['1qb'];
    if(!vals)continue;
    let lo=0,hi=pk.dates.length-1,best=0;
    while(lo<=hi){
      const mid=Math.floor((lo+hi)/2);
      if(pk.dates[mid]<=dateStr){best=mid;lo=mid+1;}
      else hi=mid-1;
    }
    const v=vals[best];
    if(v!=null&&v>0)return v;
  }
  return 0;
}

// Convert pick label to CSV tier format
function normPickLabel(label){
  // "2026 2nd" → try to determine tier from context
  // "2026 2.04" → "2026 Mid 2nd" (slot 4 of ~10)
  const slotMatch=label.match(/(\d{4})\s+(\d+)\.(\d+)/);
  if(slotMatch){
    const yr=slotMatch[1],rd=parseInt(slotMatch[2]),slot=parseInt(slotMatch[3]);
    const rdStr=rd===1?'1st':rd===2?'2nd':rd===3?'3rd':`${rd}th`;
    const leagueSize=LD?.teams?.length||10;
    const tier=slot<=Math.ceil(leagueSize/3)?'Early':slot<=Math.ceil(leagueSize*2/3)?'Mid':'Late';
    return `${yr} ${tier} ${rdStr}`;
  }
  // "2026 2nd" → default to Mid
  const roundMatch=label.match(/(\d{4})\s+(1st|2nd|3rd|4th)/);
  if(roundMatch)return `${roundMatch[1]} Mid ${roundMatch[2]}`;
  return label;
}

// Get current value for player using historical (today's date) or consensus fallback
function getCurVal(sleeperId, playerName, isSF){
  if(HIST_LOADED&&sleeperId&&HIST_PLAYERS[sleeperId]){
    const hv=getHistVal(sleeperId,todayStr(),isSF);
    if(hv!=null&&hv>0)return hv;
  }
  // Consensus fallback
  return isSF?(CSF[n(playerName||'')]||0):(C1QB[n(playerName||'')]||0);
}

// Load traded picks for exact slot resolution
async function loadTradedPicksForChain(chain){
  for(const{id:lgId}of chain){
    try{
      const picks=await g(`${API}/league/${lgId}/traded_picks`);
      for(const pk of picks||[]){
        if(pk.pick_no==null&&pk.pick_no!==0)continue;
        const yr=String(pk.season||'');
        const rd=String(pk.round||'');
        const rid=String(pk.roster_id||'');
        const slot=pk.pick_no;
        // Store multiple key formats to handle type mismatches
        // Format 1: lgId_season_round_rosterid (primary)
        TRADED_PICKS[`${lgId}_${yr}_${rd}_${rid}`]=slot;
        // Format 2: season_round_rosterid (no lgId, for cross-league)
        TRADED_PICKS[`${yr}_${rd}_${rid}`]=slot;
        // Format 3: season_round_ownerid (current owner)
        if(pk.owner_id)TRADED_PICKS[`${lgId}_${yr}_${rd}_own_${pk.owner_id}`]=slot;
        // Format 4: previous_owner_id (the one who sent it)
        if(pk.previous_owner_id)TRADED_PICKS[`${lgId}_${yr}_${rd}_prev_${pk.previous_owner_id}`]=slot;
      }
    }catch(e){console.warn('traded_picks failed for',lgId);}
  }
  console.log('Traded picks loaded:',Object.keys(TRADED_PICKS).length,'entries');
  // Rebuild slots with traded_picks data
  if(ALL_DRAFTS.length)buildDraftSlots();
}

async function runScout(username,leagueId){
  document.getElementById('sb').disabled=true;
  document.getElementById('sb').textContent='LOADING...';
  ['mainTabs','topBar','myStats'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('leaguePicker').style.display='none';
  showLoad('INITIALIZING WAR ROOM',0);

  try{
    upLoad('LOADING PLAYER + HISTORICAL DATA',12);
    // Load all three in parallel — historical values needed for draft grades
    await Promise.all([loadConsensus(),loadPlayers(),loadHistoricalValues()]);
    console.log('HIST_LOADED:',HIST_LOADED,'players:',Object.keys(HIST_PLAYERS).length);

    upLoad('FETCHING LEAGUE DATA',24);
    const[league,rosters,users]=await Promise.all([
      g(`${API}/league/${leagueId}`),
      g(`${API}/league/${leagueId}/rosters`),
      g(`${API}/league/${leagueId}/users`)
    ]);
    const isSF=(league.roster_positions||[]).includes('SUPER_FLEX');
    const um={};for(const u of users)um[u.user_id]=u;
    const meUser=await g(`${API}/user/${username}`).catch(()=>null);
    const myUID=meUser?.user_id;

    upLoad('BUILDING ROSTERS',36);
    const teams=rosters.map(r=>{
      const u=um[r.owner_id]||{};
      const isMe=r.owner_id===myUID;
      const players=(r.players||[]).map(id=>{
        const p=PM[id]||{name:id,pos:'?',value:0,age:0};
        const v=isSF?(CSF[n(p.name||'')]||p.value||0):(C1QB[n(p.name||'')]||p.value||0);
        return{id,...p,value:v};
      }).filter(p=>['QB','RB','WR','TE'].includes(p.pos));
      players.sort((a,b)=>b.value-a.value);
      const total=players.reduce((s,p)=>s+p.value,0);
      const byPos={QB:[],RB:[],WR:[],TE:[]};
      for(const p of players)if(byPos[p.pos])byPos[p.pos].push(p);
      const STARTS={QB:2,RB:4,WR:4,TE:2};
      const posVal={};
      for(const[pos,arr]of Object.entries(byPos))posVal[pos]=arr.slice(0,STARTS[pos]).reduce((s,p)=>s+p.value,0);
      const T={QB:[14000,8000],RB:[20000,12000],WR:[20000,12000],TE:[9000,5000]};
      const posGrades={};
      for(const pos of Object.keys(byPos)){const v=posVal[pos];const t=T[pos];posGrades[pos]=v>=t[0]?'strong':v>=t[1]?'ok':'weak';}
      const pa=players.filter(p=>p.age>18);
      const avgAge=pa.length?pa.reduce((s,p)=>s+p.age,0)/pa.length:26;
      const w=win(total,avgAge);
      return{roster_id:r.roster_id,owner_id:r.owner_id,isMe,
        username:u.display_name||u.username||'Unknown',
        avatar:u.avatar?`https://sleepercdn.com/avatars/${u.avatar}`:'',
        team_name:r.metadata?.team_name||'',
        players,total,byPos,posVal,posGrades,win:w,avgAge,
        wins:r.settings?.wins||0,losses:r.settings?.losses||0};
    }).sort((a,b)=>b.total-a.total);

    upLoad('PULLING TRADE HISTORY',50);
    // Follow league chain
    // Use actual league season year
    const currentSeason=parseInt(league.season||new Date().getFullYear());
    const chain=[];let scanId=leagueId,yr=currentSeason;

    // Build backward chain (previous seasons)
    for(let i=0;i<4;i++){
      try{
        const lg=await g(`${API}/league/${scanId}`);
        chain.push({id:scanId,season:yr});
        if(lg.previous_league_id&&lg.previous_league_id!==scanId){scanId=lg.previous_league_id;yr--;}
        else break;
      }catch(e){break;}
    }

    // Find forward leagues (2026 rollover) using multiple strategies
    const forwardLeagues=[];
    const newestInChain=chain[0]; // most recent league we found

    // Strategy 1: Check league's own next_league_id (set by Sleeper on rollover)
    try{
      const leagueDetails=await g(`${API}/league/${newestInChain.id}`);
      if(leagueDetails.next_league_id&&leagueDetails.next_league_id!==newestInChain.id){
        const nextSeason=newestInChain.season+1;
        forwardLeagues.push({id:leagueDetails.next_league_id,season:nextSeason});
        console.log('Found via next_league_id:',leagueDetails.next_league_id,'season:',nextSeason);
      }
    }catch(e){}

    // Strategy 2: Check user's leagues for each upcoming season
    if(meUser?.user_id&&forwardLeagues.length===0){
      for(const nextYr of [currentSeason+1, currentSeason+2]){
        try{
          const nextLeagues=await g(`${API}/user/${meUser.user_id}/leagues/nfl/${nextYr}`);
          for(const nl of (nextLeagues||[])){
            if(nl.previous_league_id===newestInChain.id&&nl.settings?.type===2){
              forwardLeagues.push({id:nl.league_id,season:nextYr});
              console.log('Found via user leagues:',nl.league_id,'season:',nextYr,nl.name);
            }
          }
          if(forwardLeagues.length>0)break;
        }catch(e){}
      }
    }

    // Strategy 3: Check ALL user's dynasty leagues for any season ahead
    if(meUser?.user_id&&forwardLeagues.length===0){
      try{
        const allYears=[2026,2027];
        for(const yr of allYears){
          const yLeagues=await g(`${API}/user/${meUser.user_id}/leagues/nfl/${yr}`).catch(()=>[]);
          for(const nl of (yLeagues||[])){
            if(nl.settings?.type===2){
              // Check if this league's chain connects back to ours
              const nlDetails=await g(`${API}/league/${nl.league_id}`).catch(()=>null);
              if(nlDetails?.previous_league_id===newestInChain.id||
                 chain.some(c=>c.id===nlDetails?.previous_league_id)){
                forwardLeagues.push({id:nl.league_id,season:yr});
                console.log('Found via chain match:',nl.league_id,nl.name,'season:',yr);
                break;
              }
            }
          }
          if(forwardLeagues.length>0)break;
        }
      }catch(e){console.warn('Strategy 3 failed:',e.message);}
    }

    // Add forward leagues to front of chain
    for(const fl of forwardLeagues.reverse()){
      if(!chain.find(c=>c.id===fl.id)){
        chain.unshift(fl);
      }
    }

    console.log('League chain:',chain.map(c=>`${c.season}:${c.id}`).join(' → '));
    upLoad('SCANNING TRANSACTIONS',48);
    console.log('Chain:',chain.map(c=>`${c.season}:${c.id}`).join(', '));
    console.log('Active league ID:',leagueId);

    const allTrades=[],waiverAct={};

    // Fetch transactions in parallel batches — much faster than sequential
    async function fetchLeagueTxns(lgId, season){
      const BATCH=5; // fetch 5 weeks at once
      for(let wk=1;wk<=22;wk+=BATCH){
        const batch=[];
        for(let i=0;i<BATCH&&wk+i<=22;i++){
          batch.push(
            g(`${API}/league/${lgId}/transactions/${wk+i}`)
              .then(r=>({wk:wk+i,data:r||[]}))
              .catch(()=>({wk:wk+i,data:[]}))
          );
        }
        const results=await Promise.all(batch);
        let anyData=false;
        for(const{wk:w,data}of results){
          if(data.length)anyData=true;
          for(const t of data){
            if(t.type==='trade'&&t.status==='complete')allTrades.push({...t,week:w,season});
            if(t.type==='waiver'&&t.status==='complete'&&season===2025){
              const rid=t.roster_ids?.[0];
              if(rid)waiverAct[rid]=(waiverAct[rid]||0)+1;
            }
          }
        }
        // Stop if entire batch was empty (no more activity)
        if(!anyData)break;
      }
    }

    // Fetch all seasons in parallel (cap at 3 seasons for speed)
    const chainToFetch=chain.slice(0,3);
    await Promise.all(chainToFetch.map(({id:lgId,season})=>fetchLeagueTxns(lgId,season)));

    upLoad('GRADING TRADES',70);
    const gradedTrades=allTrades.map(t=>{
      // Get date of trade for historical value lookup
      const tradeDateStr=t.created?new Date(t.created).toISOString().slice(0,10):null;
      const lgId=chain.find(c=>c.season===(t.season||2025))?.id||leagueId;

      const sides=(t.roster_ids||[]).map(rid=>{
        const team=teams.find(tm=>tm.roster_id===rid);
        const adds=Object.entries(t.adds||{}).filter(([,r])=>r===rid).map(([id])=>id);
        const drops=Object.entries(t.drops||{}).filter(([,r])=>r===rid).map(([id])=>id);
        const aPks=(t.draft_picks||[]).filter(pk=>pk.owner_id===rid&&pk.previous_owner_id!==rid);
        const dPks=(t.draft_picks||[]).filter(pk=>pk.previous_owner_id===rid&&pk.owner_id!==rid);

        // Value at TIME OF TRADE (historical) vs TODAY (current)
        function playerValAtDate(id, dateStr){
          const p=PM[id];if(!p)return{then:0,now:0};
          const isSF=LD?.isSF||false;
          const thenVal=HIST_LOADED&&dateStr?
            (getHistVal(id,dateStr,isSF)||pv(id)):pv(id);
          const nowVal=getCurVal(id,p.name,isSF);
          return{then:thenVal,now:nowVal};
        }

        const addVals=adds.map(id=>playerValAtDate(id,tradeDateStr));
        const dropVals=drops.map(id=>playerValAtDate(id,tradeDateStr));
        const aVthen=addVals.reduce((s,v)=>s+v.then,0)+aPks.reduce((s,pk)=>s+PV(pk,tradeDateStr),0);
        const aVnow=addVals.reduce((s,v)=>s+v.now,0)+aPks.reduce((s,pk)=>s+PVcurrent(pk),0);
        const dVthen=dropVals.reduce((s,v)=>s+v.then,0)+dPks.reduce((s,pk)=>s+PV(pk,tradeDateStr),0);
        const dVnow=dropVals.reduce((s,v)=>s+v.now,0)+dPks.reduce((s,pk)=>s+PVcurrent(pk),0);

        return{team,rid,
          aP:adds.map(id=>PM[id]?.name||id),dP:drops.map(id=>PM[id]?.name||id),
          aPks:aPks.map(pk=>PL(pk,lgId)),dPks:dPks.map(pk=>PL(pk,lgId)),
          _rawAPks:aPks,_rawDPks:dPks,
          aV:aVthen,dV:dVthen,
          aVnow,dVnow,
          net:aVthen-dVthen};
      });
      const sorted=[...sides].sort((a,b)=>b.net-a.net);
      const winner=sorted[0],loser=sorted[1];
      const diff=Math.abs((winner?.net||0)-(loser?.net||0));
      const ref=Math.max(winner?.aV||1,300);
      const pct=Math.round(diff/ref*100);
      return{...t,sides,winner,loser,diff,pct,grade:grade(pct),
        totalMoved:(winner?.aV||0)+(loser?.aV||0)};
    });

    // Trade records
    const tRec={};
    for(const t of gradedTrades){
      for(const s of t.sides){
        const un=s.team?.username||'?';
        if(!tRec[un])tRec[un]={won:0,lost:0,fair:0,vg:0,count:0,
          posFlow:{QB:0,RB:0,WR:0,TE:0},pG:0,pR:0,partners:{},weekDist:[]};
        const rec=tRec[un];rec.count++;
        if(s===t.winner)rec.won++;
        else if(t.pct<=5)rec.fair++;
        else rec.lost++;
        rec.vg+=s.net;
        rec.pG+=s.dPks.length;rec.pR+=s.aPks.length;
        for(const nm of s.aP){const p=Object.values(PM).find(x=>x.name===nm);if(p?.pos&&rec.posFlow[p.pos]!=null)rec.posFlow[p.pos]++;}
        for(const nm of s.dP){const p=Object.values(PM).find(x=>x.name===nm);if(p?.pos&&rec.posFlow[p.pos]!=null)rec.posFlow[p.pos]--;}
        for(const s2 of t.sides){if(s2!==s&&s2.team){const pu=s2.team.username;rec.partners[pu]=(rec.partners[pu]||0)+1;}}
        rec.weekDist.push(t.week);
      }
    }

    // Soft targets
    const softT=Object.entries(tRec)
      .filter(([,r])=>r.count>=1)
      .map(([un,r])=>({un,...r,score:r.lost*2-r.won+(r.vg<0?Math.abs(r.vg/400):0)}))
      .sort((a,b)=>b.score-a.score);

    upLoad('LOADING DRAFT DATA + PICK SLOTS',82);
    await loadTradedPicksForChain(chain);

        const drafts=await g(`${API}/league/${lgId}/drafts`);
        for(const draft of (drafts||[])){
          // Accept any draft type — filter by rounds later, not type
          try{
            const picks=await g(`${API}/draft/${draft.draft_id}/picks`);
            const draftObj={...draft,season,picks:picks||[]};
            ALL_DRAFTS.push(draftObj);
            rawDrafts.push(draftObj);
            console.log(`Draft found: ${draft.draft_id} type=${draft.type} rounds=${draft.settings?.rounds} status=${draft.status} season=${season} picks=${picks?.length||0}`);
          }catch(e){console.warn('Draft picks fetch failed:',draft.draft_id,e.message);}
          await S(40);
        }
      }catch(e){}
    }
    // Keep rookie drafts (type=linear/snake with <=6 rounds) 
    // Startup drafts have many more rounds (15+) so filter those
    // Filter: keep rookie drafts (<=8 rounds). Startup drafts have 15+ rounds.
    const preFilter=ALL_DRAFTS.length;
    ALL_DRAFTS=ALL_DRAFTS.filter(d=>{
      const rounds=parseInt(d.settings?.rounds||0);
      if(rounds===0)return true; // unknown rounds — keep it
      return rounds<=8; // rookie = 4-5 rounds, startup = 15+
    });
    // If nothing passes, keep everything (better to show something)
    if(!ALL_DRAFTS.length&&preFilter>0){
      ALL_DRAFTS=[...rawDrafts];
      console.warn('Draft filter removed everything — showing all',preFilter,'drafts');
    }
    console.log('Drafts loaded:',ALL_DRAFTS.length,'rookie drafts across',chain.length,'seasons');

    // Build draft slot lookup from completed drafts + traded picks
    buildDraftSlots();
    upLoad('WAR ROOM READY',100);await S(400);

    LD={league,isSF,teams,users,um,myUID,chain,rawDraftCount:rawDrafts.length,
        gradedTrades,tRec,softT,waiverAct};

    const me=teams.find(t=>t.isMe);
    document.getElementById('topBar').style.display='flex';
    document.getElementById('topBar').className='top-bar';
    document.getElementById('topBar').innerHTML=`
      <div class="tb-lg">${league.name||'League'}</div>
      <span class="tbb tbb-t">${league.total_rosters||12} TEAMS</span>
      <span class="tbb ${isSF?'tbb-t':'tbb-p'}">${isSF?'SF PPR':'1QB PPR'}</span>
      <span class="tbb tbb-g">${gradedTrades.length} TRADES · ${chain.length} SEASONS</span>
      <div class="tb-r">
        ${me?`<span class="my-badge">⭐ @${me.username}</span>`:''}
        <button onclick="resetForm()" style="padding:4px 10px;background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--txt3);font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">CHANGE</button>
      </div>`;

    if(me){
      document.getElementById('myStats').style.display='flex';
      document.getElementById('myStats').className='my-stats';
      document.getElementById('myStats').innerHTML=
        `<div class="ms-lbl">YOU</div>`+
        Object.entries(me.posGrades).map(([pos,gr])=>{
          const v=me.posVal[pos];
          const rk=teams.filter(t=>t.posVal[pos]>v).length+1;
          const cls=gr==='strong'?'pg-A':gr==='ok'?'pg-B':'pg-C';
          const ltr=gr==='strong'?'A+':gr==='ok'?'B+':'C+';
          return`<span class="pg ${cls}">${pos} ${ltr} #${rk}</span>`;
        }).join('');
    }

    document.getElementById('mainTabs').style.display='flex';
    setMain('warroom',document.querySelector('.mt-btn'));

  }catch(e){
    console.error(e);
    document.getElementById('content').innerHTML=`<div class="empty">${e.message||'Error loading league'}<br><br><button onclick="resetForm()" style="margin-top:8px;padding:6px 16px;background:var(--teal);color:#000;border:none;border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer">TRY AGAIN</button></div>`;
  }
  document.getElementById('sb').disabled=false;
  document.getElementById('sb').textContent='ANALYZE →';
}

function resetForm(){
  ['mainTabs','topBar','myStats'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('content').innerHTML='';
  document.getElementById('heroSection').style.display='flex';
  document.getElementById('searchForm').style.display='flex';
  document.getElementById('leaguePicker').style.display='none';
  window.scrollTo(0,0);
}

// ── MAIN TAB SWITCH ──
function setMain(tab,btn){
  document.querySelectorAll('.mt-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const el=document.getElementById('content');
  if(tab==='warroom')el.innerHTML=buildWarRoom();
  else if(tab==='trades'){el.innerHTML=buildTradeGrades();bindTradeEvents();setTimeout(renderTradeList,50);}
  else if(tab==='drafts'){
    try{el.innerHTML=buildDraftGrades();}
    catch(e){
      console.error('Draft grades error:',e);
      el.innerHTML=`<div class="empty" style="padding:48px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--txt2);margin-bottom:8px">DRAFT GRADES ERROR</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--red)">${e.message}</div>
        <div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--txt3)">Check console for details</div>
      </div>`;
    }
  }
  else if(tab==='targets')el.innerHTML=buildTargets();
  if(tab==='warroom'&&ACTIVE_MGR)setTimeout(()=>selectMgr(ACTIVE_MGR),60);
  // Filter applied inside buildWarRoom
}

// ═══════════════════════════════════════════════════
// WAR ROOM
// ═══════════════════════════════════════════════════
function buildWarRoom(){
  const{teams,tRec,waiverAct}=LD;
  const me=teams.find(t=>t.isMe);

  // When filter active, only show teams that match it
  const visibleTeams=WR_FILTER==='all'?teams.filter(t=>!t.isMe):
    teams.filter(t=>!t.isMe&&teamMatchesFilter(t,WR_FILTER));

  const scored=visibleTeams.map(t=>{
    let sc=0,reasons=[];
    if(me){
      for(const pos of['QB','RB','WR','TE']){
        if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak'){sc+=3;reasons.push(`SELL ${pos} → they need badly`);}
        if(me.posGrades[pos]==='weak'&&t.posGrades[pos]==='strong'){sc+=3;reasons.push(`BUY ${pos} → they have depth`);}
        if(me.posGrades[pos]==='ok'&&t.posGrades[pos]==='weak'){sc+=1;}
      }
      if(me.win.w==='CONTENDING'&&(t.win.w==='REBUILDING'||t.win.w==='DECLINING'))sc+=2;
      if(me.win.w==='REBUILDING'&&(t.win.w==='CONTENDING'||t.win.w==='PEAKING'))sc+=2;
    }
    return{t,sc,reasons};
  }).sort((a,b)=>b.sc-a.sc);

  const prime=scored.filter(s=>s.sc>=5);
  const worth=scored.filter(s=>s.sc>=2&&s.sc<5);
  const low=scored.filter(s=>s.sc<2);

  const totalTrades=LD.gradedTrades.length;
  const tpt=(totalTrades/Math.max(1,teams.length)).toFixed(1);
  const rebuilders=teams.filter(t=>t.win.w==='REBUILDING'||t.win.w==='DECLINING').length;
  const contenders=teams.filter(t=>t.win.w==='CONTENDING'||t.win.w==='PEAKING').length;

  function mgrItem(s){
    const{t}=s;
    const tr=tRec[t.username]||{count:0,won:0,lost:0};
    const wc=waiverAct[t.roster_id]||0;
    const act=(tr.count||0)+(wc||0);
    const sc=s.sc||0;
    const scColor=sc>=5?'var(--green)':sc>=2?'var(--teal)':'var(--txt3)';
    const scBg=sc>=5?'rgba(0,230,118,0.08)':sc>=2?'rgba(0,212,255,0.06)':'rgba(20,30,48,0.8)';
    const scBdr=sc>=5?'rgba(0,230,118,0.3)':sc>=2?'rgba(0,212,255,0.2)':'rgba(77,106,138,0.2)';
    const grades=Object.entries(t.posGrades).map(([pos,gr])=>{
      const v=t.posVal[pos];
      const rk=LD.teams.filter(x=>x.posVal[pos]>v).length+1;
      const col=gr==='strong'?'var(--green)':gr==='ok'?'var(--teal)':'var(--red)';
      const bdr=gr==='strong'?'rgba(0,230,118,0.25)':gr==='ok'?'rgba(0,212,255,0.2)':'rgba(255,61,87,0.25)';
      return`<span class="mg" style="color:${col};border-color:${bdr}">${pos} #${rk}</span>`;
    }).join('');
    const desc=s.reasons.length?s.reasons[0]:`${t.win.w} · ${act} activity`;
    return`<div class="mgr-item${t.isMe?' is-me':''}" id="mi-${t.roster_id}" onclick="selectMgr('${t.roster_id}')">
      <div class="mi-sc" style="background:${scBg};color:${scColor};border-color:${scBdr}">${sc>0?sc:'—'}</div>
      <div class="mi-body">
        <div class="mi-name">${t.username}${t.isMe?' ★':''}</div>
        <div class="mi-desc">${desc}</div>
        <div class="mi-grades">${grades}<span style="font-family:var(--mono);font-size:9px;color:var(--txt3);margin-left:4px">${tr.count} intel</span></div>
      </div>
    </div>`;
  }

  function section(label,color,items){
    if(!items.length)return'';
    return`<div class="mgr-section">
      <div class="mgr-section-hd">
        <div class="msh-bar" style="background:${color}"></div>
        <div class="msh-label" style="color:${color}">${label}</div>
      </div>
      ${items.map(mgrItem).join('')}
    </div>`;
  }

  const meSection=me?`<div class="mgr-section">
    <div class="mgr-section-hd">
      <div class="msh-bar" style="background:var(--purple)"></div>
      <div class="msh-label" style="color:var(--purple)">SELF SCOUT</div>
    </div>
    <div class="mgr-item is-me" id="mi-${me.roster_id}" onclick="selectMgr('${me.roster_id}')">
      <div class="mi-sc" style="background:rgba(155,109,255,0.08);color:var(--purple);border-color:rgba(155,109,255,0.25)">YOU</div>
      <div class="mi-body">
        <div class="mi-name">${me.username} ★</div>
        <div class="mi-desc">${me.win.w} · ${(tRec[me.username]||{count:0}).count} trades · ${waiverAct[me.roster_id]||0} waivers</div>
        <div class="mi-grades">${Object.entries(me.posGrades).map(([pos,gr])=>{
          const col=gr==='strong'?'var(--green)':gr==='ok'?'var(--teal)':'var(--red)';
          const bdr=gr==='strong'?'rgba(0,230,118,0.25)':gr==='ok'?'rgba(0,212,255,0.2)':'rgba(255,61,87,0.25)';
          return`<span class="mg" style="color:${col};border-color:${bdr}">${pos} ${gr==='strong'?'A+':gr==='ok'?'B+':'C'}</span>`;
        }).join('')}</div>
      </div>
    </div>
  </div>`:''

  return`
  <div class="wr-wrap">
    <div class="wr-intel-bar">
      <div class="ib-chip">LEAGUE AVG <strong>${tpt}</strong> TRADES/TEAM</div>
      ${rebuilders>0?'<div class="ib-chip"><strong>'+rebuilders+'</strong> REBUILDERS — BUYER\'S MARKET FOR PICKS</div>':''}
      ${contenders>0?'<div class="ib-chip"><strong>'+contenders+'</strong> CONTENDERS — WILL PAY FOR WIN-NOW TALENT</div>':''}
    </div>
    <div class="wr-filter">
      ${[
        {f:'all',l:'ALL'},
        {f:'TE',l:'NEEDS TE'},
        {f:'RB',l:'NEEDS RB'},
        {f:'WR',l:'NEEDS WR'},
        {f:'QB',l:'NEEDS QB'},
        {f:'picks',l:'HAS PICKS'},
        {f:'rebuild',l:'REBUILDERS'},
        {f:'contend',l:'CONTENDERS'},
      ].map(({f,l})=>{
        const cnt=f==='all'?teams.filter(t=>!t.isMe).length:
          teams.filter(t=>!t.isMe&&teamMatchesFilter(t,f)).length;
        const cntStr=f!=='all'?'('+cnt+')':'';
        return`<button class="wf${WR_FILTER===f?' active':''}" onclick="setWRF('${f}')">${l} ${cntStr}</button>`;
      }).join('')}
      <button class="wf wf-right" onclick="setMain('warroom',document.querySelector('.mt-btn'))">↻ REFRESH</button>
    </div>
    <div class="two-panel">
      <div class="tp-left" id="wrLeft">
        ${section('PRIME TARGETS','var(--green)',prime)}
        ${section('WORTH EXPLORING','var(--teal)',worth)}
        ${section('LOW LEVERAGE','var(--txt3)',low)}
        ${meSection}
      </div>
      <div class="tp-right" id="wrRight">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:48px;text-align:center;color:var(--txt3)">
          <div style="font-family:var(--mono);font-size:10px;letter-spacing:3px;margin-bottom:10px">SELECT A MANAGER</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--txt2)">CLICK ANY MANAGER FOR FULL INTEL</div>
        </div>
      </div>
    </div>
  </div>`;
}

function setWRF(f){
  WR_FILTER=f;
  const el=document.getElementById('content');
  el.innerHTML=buildWarRoom();
  if(ACTIVE_MGR)setTimeout(()=>selectMgr(ACTIVE_MGR),60);
}

function teamMatchesFilter(team, f){
  if(f==='all')return true;
  const tr=LD.tRec[team.username]||{pR:0,pG:0};
  if(f==='TE')return team.posGrades.TE==='weak';
  if(f==='RB')return team.posGrades.RB==='weak';
  if(f==='WR')return team.posGrades.WR==='weak';
  if(f==='QB')return team.posGrades.QB==='weak';
  if(f==='picks')return(tr.pR-tr.pG)>=2;
  if(f==='rebuild')return team.win.w==='REBUILDING'||team.win.w==='DECLINING';
  if(f==='contend')return team.win.w==='CONTENDING'||team.win.w==='PEAKING';
  return true;
}

function selectMgr(rid){
  ACTIVE_MGR=rid;
  document.querySelectorAll('.mgr-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('mi-'+rid);
  if(el)el.classList.add('active');

  const{teams,tRec,waiverAct,gradedTrades,isSF}=LD;
  const t=teams.find(t=>String(t.roster_id)===String(rid));
  if(!t)return;
  const tr=tRec[t.username]||{count:0,won:0,lost:0,vg:0,posFlow:{},pG:0,pR:0,partners:{},weekDist:[]};
  const wc=waiverAct[t.roster_id]||0;
  const me=teams.find(tm=>tm.isMe);

  let yourPlay='Explore trade conversations';
  if(me){
    for(const pos of['QB','RB','WR','TE']){
      if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak'){yourPlay=`Sell ${pos} depth — they rank last at this position`;break;}
      if(me.posGrades[pos]==='weak'&&t.posGrades[pos]==='strong'){yourPlay=`Target their ${pos} depth — you need it badly`;break;}
    }
    if(t.win.w==='REBUILDING'&&me.win.w==='CONTENDING')yourPlay='Buy youth and picks — they are selling for the future';
    if(t.win.w==='CONTENDING'&&me.win.w==='REBUILDING')yourPlay='Sell win-now veterans for picks and young talent';
  }

  const posRanks={};
  for(const pos of['QB','RB','WR','TE'])posRanks[pos]=LD.teams.filter(x=>x.posVal[pos]>t.posVal[pos]).length+1;

  // Build need intel cards
  const needCards=[];
  for(const pos of['QB','RB','WR','TE']){
    if(t.posGrades[pos]==='weak'){
      const best=t.byPos[pos][0];
      needCards.push({stripe:'var(--red)',tags:['roster','this-league','strong'],
        title:`Desperate for ${pos} — ranked #${posRanks[pos]} of ${LD.teams.length}`,
        desc:`Best ${pos}: ${best?best.name+' ('+best.value.toLocaleString()+')':'none on roster'}. Critical hole — should overpay.`});
    }else if(t.posGrades[pos]==='ok'){
      needCards.push({stripe:'var(--gold)',tags:['roster','this-league'],
        title:`${pos} depth is thin — #${posRanks[pos]} of ${LD.teams.length}`,
        desc:`Has starter-level talent but lacks depth. An upgrade offer could find traction.`});
    }
  }
  if(tr.pR-tr.pG>=3){
    needCards.push({stripe:'var(--purple)',tags:['pick','this-league','strong'],
      title:`Sitting on ${tr.pR-tr.pG} extra picks — needs to convert to talent`,
      desc:`Pick-heavy roster approaching draft. Any quality player for picks offer gets serious consideration.`});
  }
  if(tr.pG-tr.pR>=3){
    needCards.push({stripe:'var(--red)',tags:['pick','this-league','strong'],
      title:`Capital-poor — gave away ${tr.pG} picks, only received ${tr.pR}`,
      desc:`Limited rebuild path. If contention window closes, few assets to pivot.`});
  }

  // Build trade intel cards with signal strength
  const tradeCards=[];
  const leagueAvg=Object.values(LD.tRec).reduce((s,r)=>s+(r.count||0),0)/Math.max(1,LD.teams.length);
  const actPct=leagueAvg>0?Math.round(((tr.count/leagueAvg)-1)*100):0;
  const actRk=LD.teams.filter(tm=>(LD.tRec[tm.username]||{count:0}).count>tr.count).length+1;
  const sigStr=(count)=>count>=8?'strong':count>=4?'moderate':'limited';
  const sigColor=(count)=>count>=8?'var(--green)':count>=4?'var(--gold)':'var(--txt3)';

  // Position flow
  const flowItems=Object.entries(tr.posFlow||{}).filter(([,v])=>Math.abs(v)>=2)
    .map(([pos,v])=>({pos,v,label:v<0?`${pos} Disposer — net ${v} flow`:`${pos} Acquirer — net +${v} flow`}));
  for(const fi of flowItems){
    const sig=sigStr(tr.count);
    tradeCards.push({stripe:fi.v<0?'var(--red)':'var(--green)',
      tags:['trade-bias','this-league',sig],
      title:fi.label,
      desc:fi.v<0?
        `Traded away ${Math.abs(fi.v)} more ${fi.pos}s than acquired. Uses ${fi.pos} as trade fuel — lead with ${fi.pos} offers to get engagement.`:
        `Acquired ${fi.v} more ${fi.pos}s than sent. Consistently buying this position — they see value here.`});
  }

  // Trade partner relationships
  const allPartners=Object.entries(tr.partners||{}).sort((a,b)=>b[1]-a[1]);
  const topP=allPartners[0];
  if(topP&&topP[1]>=2){
    const sig=sigStr(topP[1]);
    tradeCards.push({stripe:'var(--gold)',tags:['relationship','this-league',sig],
      title:`Trades with ${topP[0]} frequently — ${topP[1]} times`,
      desc:`Established trade relationship. You can disrupt this by offering better value than their usual partner. ${allPartners.length>1?'Also trades with: '+allPartners.slice(1,3).map(([u,c])=>`${u} (${c}x)`).join(', ')+'.'  :''}`});
  }
  // Has never traded with YOU
  if(!tr.partners[me?.username]&&me){
    tradeCards.push({stripe:'var(--purple)',tags:['relationship','this-league','strong'],
      title:`Has never traded with you`,
      desc:`Zero trade history between you in this league. They may not see you as a trade partner yet — initiate contact with a strong offer to establish the relationship.`});
  }

  // Pick spending pattern
  if(tr.pG>=3){
    const sig=sigStr(tr.pG);
    tradeCards.push({stripe:'var(--purple)',tags:['pick','this-league',sig],
      title:`Spends 1st-round picks freely — gave away ${tr.pG} across ${tr.count} trades`,
      desc:`High capital spending. Willing to part with premium draft assets. Include picks in your offers — they're comfortable with that currency.`});
  }else if(tr.pR-tr.pG>=3){
    tradeCards.push({stripe:'var(--teal)',tags:['pick','this-league','strong'],
      title:`Pick hoarder — sitting on ${tr.pR-tr.pG} more picks than given`,
      desc:`Capital-rich but needs to convert to talent. Will take quality players for picks — that's the deal structure to pitch.`});
  }

  // Trade activity + style
  const actLabel=actRk===1?'Most active trader in the league':
    actRk<=3?`#${actRk} most active trader`:
    actPct<-30?'Infrequent trader':'Active trader';
  const trPerYr=(tr.count/Math.max(1,LD.chain.length)).toFixed(1);
  const actSig=tr.count>=8?'strong':tr.count>=4?'moderate':'limited';
  tradeCards.push({stripe:'var(--teal)',tags:['style','this-league',actSig],
    title:`${actLabel} — ${tr.count} deals (${trPerYr}/yr) (#${actRk} of ${LD.teams.length} in league)`,
    desc:actPct>30?
      `Top ${100-Math.min(99,actRk/LD.teams.length*100)|0}% of the league by trade volume (+${actPct}% vs avg). High engagement — will respond to offers and negotiate aggressively.`:
      actPct>-20?`Average trade activity. Selective but dealable — approach with a clearly favorable offer.`:
      `One of the least active traders. Limited data on patterns. Don't expect quick engagement — make it easy to say yes.`});

  // Month-based timing from weekDist
  if(tr.weekDist&&tr.weekDist.length>=3){
    const wkCounts={};
    for(const w of tr.weekDist)wkCounts[w]=(wkCounts[w]||0)+1;
    const peakWks=Object.entries(wkCounts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([w])=>parseInt(w));
    const wkToMonth=(w)=>{
      const months=['Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul'];
      return months[Math.floor((w-1)/4.5)|0]||'offseason';
    };
    const peakMonths=[...new Set(peakWks.map(wkToMonth))];
    const isOffseason=peakWks.some(w=>w>18||w<=3);
    tradeCards.push({stripe:'var(--gold)',tags:['timing','this-league',sigStr(tr.count)],
      title:`${isOffseason?'Offseason trader':'In-season trader'} — most active ${peakMonths.join(' & ')}`,
      desc:`Trade volume peaks in ${peakMonths.join(' and ')}. Time your offers for when they're most engaged — cold offers sent at the wrong time get ignored.`});
  }

  // Window card with specific advice
  if(t.win.w==='CONTENDING'||t.win.w==='PEAKING'){
    const isAging=t.avgAge>=29;
    tradeCards.push({stripe:'var(--green)',tags:['window','this-league','strong'],
      title:`${t.win.w} — avg age ${t.avgAge.toFixed(1)}${isAging?' (window closing)':''}`,
      desc:isAging?
        `Aging contender. Their window is closing fast. Will overpay to win now — time your offers for November when playoff pressure peaks. They cannot afford to wait.`:
        `Active contender with a healthy window. Will pay up for win-now pieces. Strong leverage if you have what they need.`});
  }else if(t.win.w==='REBUILDING'||t.win.w==='DECLINING'){
    tradeCards.push({stripe:'var(--purple)',tags:['window','this-league','strong'],
      title:`${t.win.w} — avg age ${t.avgAge.toFixed(1)}`,
      desc:`Long-term builder. Prioritizes youth and future picks. Veteran/win-now offers will get rejected — pitch young players and capital.`});
  }

  // Untouchable top assets
  const topAssets=t.players.slice(0,3);
  if(topAssets.length>=2){
    tradeCards.push({stripe:'var(--red)',tags:['untouchable','this-league','strong'],
      title:`Top ${topAssets.length} assets are likely off-limits`,
      desc:`${topAssets.map(p=>`${p.name} (${p.pos}, ${p.value.toLocaleString()})`).join(', ')}. Don't waste capital unless you can dramatically overpay — cornerstone players rarely move.`});
  }

  // Acquirable mid-range players (possible sells)
  const midAssets=t.players.filter(p=>p.value>1000&&p.value<4000&&(p.age||0)>=28);
  if(midAssets.length>=1){
    const target=midAssets[0];
    tradeCards.push({stripe:'var(--teal)',tags:['acquirable','this-league','moderate'],
      title:`${target.name} (${target.pos}, ${target.value.toLocaleString()}) may be acquirable`,
      desc:`Mid-value veteran at age ${target.age||'?'}. Aging asset they may want to move for youth or picks. Worth making an offer — they may sell for below market value.`});
  }

  const trNever=LD.teams.filter(x=>!x.isMe&&x.username!==t.username&&!(tRec[t.username]?.partners[x.username]));

  function renderCards(cards){
    return cards.map(c=>`
      <div class="ic">
        <div class="ic-stripe" style="background:${c.stripe}"></div>
        <div class="ic-content">
          <div class="ic-tags">${c.tags.map(tg=>{
            const cls=tg==='roster'?'tag-roster':tg==='pick'?'tag-pick':
              tg==='trade-bias'||tg==='style'?'tag-trade':tg==='relationship'?'tag-rel':
              tg==='strong'?'tag-sig':tg==='window'?'tag-style':'tag-league';
            const lbl=tg==='this-league'?'THIS LEAGUE':tg==='strong'?'STRONG SIGNAL':
              tg==='roster'?'ROSTER HOLE':tg==='pick'?'PICK INTEL':
              tg==='trade-bias'?'TRADE BIAS':tg==='relationship'?'TRADE REL':
              tg==='style'?'TRADE STYLE':tg==='window'?'WINDOW':'NOTE';
            return`<span class="ic-tag ${cls}">${lbl}</span>`;
          }).join('')}</div>
          <div class="ic-title">${c.title}</div>
          <div class="ic-desc">${c.desc}</div>
        </div>
      </div>`).join('');
  }

  const sc=me?scored_for(t,me):0;
  const scCol=sc>=5?'var(--green)':sc>=2?'var(--teal)':'var(--txt3)';
  const posGradeHtml=Object.entries(t.posGrades).map(([pos,gr])=>{
    const rk=posRanks[pos];
    const col=gr==='strong'?'var(--green)':gr==='ok'?'var(--teal)':'var(--red)';
    const bdr=gr==='strong'?'rgba(0,230,118,0.25)':gr==='ok'?'rgba(0,212,255,0.2)':'rgba(255,61,87,0.25)';
    return`<span class="ipg" style="color:${col};border-color:${bdr}">${pos} ${gr==='strong'?'A+':gr==='ok'?'B+':'C'} #${rk}</span>`;
  }).join('');

  const right=document.getElementById('wrRight');
  if(!right)return;
  right.innerHTML=`<div class="intel-panel">
    <div class="ip-hd">
      <div class="ip-av">${t.avatar?`<img src="${t.avatar}" onerror="this.outerHTML='&#x1F3C8'">`:'🏈'}</div>
      <div style="flex:1">
        <div class="ip-nm">@${t.username}${t.isMe?' ★':''}</div>

// YOUR EDGE — what leverage do YOU have against this manager
function buildYourEdge(t, me){
  if(!me||t.isMe)return'';
  const edgeCards=[];

  // Stack angles — do you own a QB that this manager has WRs for?
  for(const myP of me.players.filter(p=>p.pos==='QB'&&p.value>3000)){
    const qbTeam=myP.team||'';
    if(!qbTeam)continue;
    // Check if they own WRs from same NFL team
    const theirStackWRs=t.players.filter(p=>(p.pos==='WR'||p.pos==='TE')&&p.team===qbTeam&&p.value>1000);
    if(theirStackWRs.length>0){
      edgeCards.push({stripe:'var(--green)',tags:['stack-angle','this-league','strong'],
        title:`Stack angle: you have ${myP.name}'s WR`,
        desc:`You own ${theirStackWRs.map(p=>p.name).join(', ')} — ${myP.name}'s target(s) in ${qbTeam}. They may overpay to complete the stack. This is real leverage.`});
    }
  }
  // Do they have your QB's WRs (inverse stack — you want them)
  for(const theirP of t.players.filter(p=>p.pos==='QB'&&p.value>3000)){
    const qbTeam=theirP.team||'';
    if(!qbTeam)continue;
    const myStackWRs=me.players.filter(p=>(p.pos==='WR'||p.pos==='TE')&&p.team===qbTeam&&p.value>1000);
    if(myStackWRs.length>0){
      edgeCards.push({stripe:'var(--teal)',tags:['stack-angle','this-league','strong'],
        title:`You have ${theirP.name}'s weapon`,
        desc:`You own ${myStackWRs.map(p=>p.name).join(', ')} — top target(s) for their QB. Pitch these at a premium to complete their offensive stack.`});
    }
  }

  // Players they're likely to overpay for (based on positional desperation)
  const pitchPlayers=[];
  for(const pos of['QB','RB','WR','TE']){
    if(t.posGrades[pos]==='weak'){
      const myDepth=me.byPos[pos]?.slice(1,3)||[];
      for(const p of myDepth){
        if(p.value>1500)pitchPlayers.push(p);
      }
    }
  }
  if(pitchPlayers.length>0){
    edgeCards.push({stripe:'var(--gold)',tags:['pitch','this-league','strong'],
      title:`Pitch at a premium — they will overpay for these`,
      desc:`Based on their roster holes, these assets from your roster are highly desirable to them: ${pitchPlayers.slice(0,3).map(p=>`${p.name} (${p.pos})`).join(', ')}. Anchor your asking price high.`});
  }

  if(!edgeCards.length)return'';

  return`<div style="margin-bottom:18px">
    <div class="is-hd"><div class="is-title" style="color:var(--teal)">YOUR EDGE</div><div class="is-cnt">${edgeCards.length} INSIGHTS</div></div>
    <div class="ic-list">${edgeCards.map(c=>`
      <div class="ic">
        <div class="ic-stripe" style="background:${c.stripe}"></div>
        <div class="ic-content">
          <div class="ic-tags">${c.tags.map(tg=>{
            const cls=tg==='stack-angle'?'tag-trade':tg==='pitch'?'tag-rel':
              tg==='strong'?'tag-sig':tg==='moderate'?'tag-warn':'tag-league';
            const lbl=tg==='stack-angle'?'STACK ANGLE':tg==='pitch'?'PITCH AT PREMIUM':
              tg==='strong'?'STRONG SIGNAL':tg==='moderate'?'MODERATE SIGNAL':
              tg==='this-league'?'THIS LEAGUE':'';
            return lbl?`<span class="ic-tag ${cls}">${lbl}</span>`:'';
          }).join('')}</div>
          <div class="ic-title">${c.title}</div>
          <div class="ic-desc">${c.desc}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function scored_for(t,me){
  let sc=0;
  for(const pos of['QB','RB','WR','TE']){
    if(me.posGrades[pos]==='strong'&&t.posGrades[pos]==='weak')sc+=3;
    if(me.posGrades[pos]==='weak'&&t.posGrades[pos]==='strong')sc+=3;
    if(me.posGrades[pos]==='ok'&&t.posGrades[pos]==='weak')sc+=1;
  }
  if(me.win.w==='CONTENDING'&&(t.win.w==='REBUILDING'||t.win.w==='DECLINING'))sc+=2;
  if(me.win.w==='REBUILDING'&&(t.win.w==='CONTENDING'||t.win.w==='PEAKING'))sc+=2;
  return sc;
}

function renderTradeList(){
  const{gradedTrades}=LD;
  let trades=TRADE_SEASON==='all'?gradedTrades:gradedTrades.filter(t=>(t.season||2025)==TRADE_SEASON);
  if(TRADE_SEARCH){
    trades=trades.filter(t=>
      t.sides?.some(s=>[...s.aP,...s.dP,...s.aPks,...s.dPks].some(nm=>String(nm).toLowerCase().includes(TRADE_SEARCH)))||
      t.sides?.some(s=>s.team?.username?.toLowerCase().includes(TRADE_SEARCH))
    );
  }
  trades=[...trades].sort((a,b)=>(b.season||2025)-(a.season||2025)||((b.week||0)-(a.week||0)));
  if(!window.TRADES_SHOWN)window.TRADES_SHOWN=6;
  const visible=trades.slice(0,window.TRADES_SHOWN);
  const hasMore=trades.length>window.TRADES_SHOWN;

  let html='<div class="trades-grid">';
  for(const t of visible){
    const[a,b]=t.sides||[];
    if(!a||!b)continue;
    const wA=a===t.winner;

    function renderAssets(side){
      let out='';
      for(const nm of side.aP||[])out+='<span class="asset">'+nm+'</span>';
      for(let i=0;i<(side.aPks||[]).length;i++){
        const pk=side.aPks[i];
        const rawPk=side._rawAPks?.[i];
        const slot=rawPk?.pick_no;
        const yr=String(rawPk?.season||rawPk?.year||'');
        const rd=String(rawPk?.round||'');
        const ptpKey=slot?yr+'_'+rd+'_'+slot:'';
        const ptp=ptpKey?PICK_TO_PLAYER[ptpKey]:null;
        const curPickVal=pickConsensusVal(pk);
        if(ptp){
          const pv=getCurVal(ptp.playerId,ptp.name,LD?.isSF);
          out+='<span class="asset pick-asset">'+pk+' → '+ptp.name+(pv>0?' '+pv.toLocaleString():'')+'</span>';
        }else{
          out+='<span class="asset pick-asset">'+pk+(curPickVal>0?' '+curPickVal.toLocaleString():'')+'</span>';
        }
      }
      return out||'<span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">—</span>';
    }

    const gradeColor=t.grade==='A'?'var(--green)':t.grade==='B'?'var(--teal)':t.grade==='C'?'var(--gold)':t.grade==='D'?'var(--orange)':'var(--red)';
    const winnerBg=wA?'rgba(0,230,118,0.1)':'rgba(255,61,87,0.1)';
    const winnerColor=wA?'var(--green)':'var(--red)';
    const winnerBdr=wA?'rgba(0,230,118,0.2)':'rgba(255,61,87,0.2)';

    html+='<div class="trade-card">';
    html+='<div class="tc-hd">';
    html+='<div class="tc-date">'+(t.season||2025)+' WK '+(t.week||'?')+'</div>';
    html+='<span style="background:'+winnerBg+';color:'+winnerColor+';border:1px solid '+winnerBdr+';border-radius:3px;padding:1px 6px;font-family:var(--mono);font-size:10px">'+(t.winner?.team?.username||'?')+' +'+Math.round(t.diff/1000*10)/10+'k</span>';
    html+='<div class="tc-moved">'+Math.round(t.totalMoved/1000*10)/10+'k MOVED</div>';
    html+='<span class="tc-grade tg-'+t.grade+'">'+t.grade+'</span>';
    html+='</div>';

    html+='<div class="tc-body">';
    // Side A
    html+='<div class="tc-side '+(wA?'w':'l')+'">';
    html+='<strong>'+(a.team?.username||'?')+' RECEIVES</strong>';
    html+=renderAssets(a);
    html+='<div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">';
    html+='<span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">AT TRADE <span style="color:var(--txt)">'+a.aV.toLocaleString()+'</span></span>';
    html+='<span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">TODAY <span style="color:'+(a.aVnow>=a.aV?'var(--green)':'var(--red)')+'">'+a.aVnow.toLocaleString()+'</span></span>';
    html+='</div></div>';
    // VS
    html+='<div>';
    html+='<div class="tc-vs">VS</div>';
    html+='<div class="tc-pct" style="color:'+(t.pct>25?'var(--red)':'var(--gold)')+'">±'+t.pct+'%</div>';
    html+='</div>';
    // Side B
    html+='<div class="tc-side '+(wA?'l':'w')+'" style="text-align:right">';
    html+='<strong>'+(b.team?.username||'?')+' RECEIVES</strong>';
    html+=renderAssets(b);
    html+='<div style="display:flex;gap:10px;margin-top:4px;justify-content:flex-end;flex-wrap:wrap">';
    html+='<span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">AT TRADE <span style="color:var(--txt)">'+b.aV.toLocaleString()+'</span></span>';
    html+='<span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">TODAY <span style="color:'+(b.aVnow>=b.aV?'var(--green)':'var(--red)')+'">'+b.aVnow.toLocaleString()+'</span></span>';
    html+='</div></div>';
    html+='</div></div>';
  }
  html+='</div>';

  if(hasMore){

function buildTGRecords(){
  const{gradedTrades,teams,tRec}=LD;
  if(!gradedTrades.length)return`<div id="tg-records" class="sec-anchor"><div class="empty">No trade history found</div></div>`;

  // Most lopsided
  const lopsided=[...gradedTrades].sort((a,b)=>b.pct-a.pct)[0];
  // Biggest blockbuster
  const blockbuster=[...gradedTrades].sort((a,b)=>b.totalMoved-a.totalMoved)[0];
  // Most active week
  const weekMap={};
  for(const t of gradedTrades){const k=`${t.season||2025} WK ${t.week||'?'}`;weekMap[k]=(weekMap[k]||0)+1;}
  const activeWeek=Object.entries(weekMap).sort((a,b)=>b[1]-a[1])[0];
  // Trade addict
  const addict=Object.entries(tRec).sort((a,b)=>b[1].count-a[1].count)[0];
  // Longest win streak
  let longestStreak=null,longestLen=0;
  for(const[un,rec]of Object.entries(tRec)){
    if(rec.won>longestLen){longestLen=rec.won;longestStreak=un;}
  }
  // Most frequent partners
  const pairMap={};
  for(const t of gradedTrades){
    const uns=(t.sides||[]).map(s=>s.team?.username||'?').sort();
    if(uns.length>=2){const key=uns.join('|');pairMap[key]=(pairMap[key]||0)+1;}
  }
  const topPair=Object.entries(pairMap).sort((a,b)=>b[1]-a[1])[0];
  // Most traded player
  const pm2={};
  for(const t of gradedTrades)for(const s of t.sides||[])for(const nm of[...s.aP,...s.dP]){pm2[nm]=(pm2[nm]||0)+1;}
  const topPlayer=Object.entries(pm2).sort((a,b)=>b[1]-a[1])[0];

  function rc(icon,title,val,sub){
    return`<div class="rec-card">
      <div class="rc-icon">${icon}</div>
      <div class="rc-title">${title}</div>
      <div class="rc-val">${val}</div>
      <div class="rc-sub">${sub}</div>
    </div>`;
  }

  const lopsidedAssets=lopsided?((lopsided.winner?.aP||[]).slice(0,2).concat((lopsided.winner?.aPks||[]).slice(0,1)).join(', ')||'—'):'—';

  return`<div id="tg-records" class="sec-anchor">
    <div class="sec-hd">LEAGUE RECORDS</div>
    <div class="sec-sub">ALL-TIME LEAGUE TRADE HISTORY RECORDS</div>
    <div class="records-grid" style="margin-bottom:32px">
      ${rc('LOPSIDED','MOST LOPSIDED TRADE',lopsided?lopsidedAssets:'—',lopsided?`+${fmtK(lopsided.diff)} for ${lopsided.winner?.team?.username||'?'} · ${lopsided.season||2025} WK ${lopsided.week||'?'}`:'')}
      ${rc('BLOCKBUSTER','BIGGEST BLOCKBUSTER',blockbuster?`${Math.round((blockbuster.totalMoved/1000)*10)/10}k MOVED`:'—',blockbuster?`${(blockbuster.sides||[]).map(s=>s.team?.username||'?').join(' ↔ ')}`:'')}
      ${rc('ACTIVE WK','MOST ACTIVE WEEK',activeWeek?activeWeek[0]:'—',activeWeek?`${activeWeek[1]} TRADES IN ONE WEEK`:'')}
      ${rc('ADDICT','TRADE ADDICT',addict?addict[0]:'—',addict?`${addict[1].count} TRADES MADE`:'')}
      ${rc('STREAK','LONGEST WIN STREAK',longestStreak||'—',`${longestLen} CONSECUTIVE TRADE WINS`)}
      ${rc('PARTNERS','MOST FREQUENT PARTNERS',topPair?topPair[0].replace('|',' ↔ '):'—',topPair?`${topPair[1]} TRADES BETWEEN THEM`:'')}
      ${rc('PLAYER','MOST TRADED PLAYER',topPlayer?topPlayer[0]:'—',topPlayer?`${topPlayer[1]} TIMES TRADED IN LEAGUE`:'')}
      ${rc('RECORDS','TRADE HISTORY',`${gradedTrades.length} TOTAL`,`ACROSS ${LD.chain.length} SEASONS`)}
    </div>
    ${ctaBar('Ask The Coach to analyze any trade in this league\'s history and explain who won and why with full historical context.')}
  </div>`;
}
