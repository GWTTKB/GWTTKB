<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWTTKB Stats Database — Dynasty Fantasy Football Analytics</title>
<meta name="description" content="The most advanced dynasty stats platform. Leaders, scatter plots, and player comparisons. Every metric mapped against dynasty value.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080e;--s1:#090e18;--s2:#0d1420;--s3:#131d2e;
  --teal:#00d4ff;--teal2:#00f0ff;--green:#00e676;--gold:#ffb700;
  --red:#ff3d57;--purple:#9b6dff;--orange:#ff8c00;
  --txt:#e8f0fa;--txt2:#8ba4c0;--txt3:#4d6a8a;
  --bdr:rgba(0,212,255,0.10);--bdr2:rgba(0,212,255,0.22);
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 24px;background:rgba(5,8,14,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);gap:16px;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--teal);text-decoration:none;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);text-decoration:none;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:var(--teal);}
.nav-spacer{flex:1;}
.nav-cta{padding:6px 16px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;text-decoration:none;border-radius:5px;}

/* TOOLBAR */
.toolbar{position:sticky;top:52px;z-index:90;background:rgba(5,8,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pos-toggle{display:flex;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;}
.pos-btn{padding:7px 18px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--txt3);background:none;border:none;border-right:1px solid var(--bdr);cursor:pointer;transition:all 0.15s;}
.pos-btn:last-child{border-right:none;}
.pos-btn.active{color:#000;}
.pos-btn.active.qb{background:var(--teal);}
.pos-btn.active.rb{background:var(--green);}
.pos-btn.active.wr{background:var(--gold);}
.pos-btn.active.te{background:var(--red);}
.mode-toggle{display:flex;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;}
.mode-btn{padding:7px 20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);background:none;border:none;border-right:1px solid var(--bdr);cursor:pointer;transition:all 0.15s;}
.mode-btn:last-child{border-right:none;}
.mode-btn.active{background:rgba(0,212,255,0.12);color:var(--teal);}
.toolbar-spacer{flex:1;}
.season-select{padding:7px 12px;background:var(--s1);border:1px solid var(--bdr);border-radius:7px;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;outline:none;}
.search-wrap{position:relative;}
.tb-search{padding:7px 12px 7px 30px;background:var(--s1);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:13px;width:200px;outline:none;transition:border-color 0.15s;}
.tb-search:focus{border-color:var(--teal);}
.tb-search::placeholder{color:var(--txt3);}
.search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}

/* MAIN CONTENT */
.main{padding:20px 24px 60px;max-width:1400px;margin:0 auto;}

/* ── LEADERS MODE ── */
.leaders-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.stat-select{padding:8px 14px;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;outline:none;min-width:220px;}
.leaders-list{display:flex;flex-direction:column;gap:6px;}
.leader-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;transition:all 0.15s;cursor:default;}
.leader-row:hover{border-color:var(--bdr2);background:var(--s2);}
.leader-rank{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--txt3);width:40px;text-align:center;flex-shrink:0;}
.leader-rank.r1{color:var(--gold);}
.leader-rank.r2{color:var(--txt2);}
.leader-rank.r3{color:var(--orange);}
.leader-hs{width:44px;height:44px;border-radius:50%;object-fit:cover;object-position:top;background:var(--s3);border:1px solid var(--bdr);flex-shrink:0;}
.leader-info{flex:1;}
.leader-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--txt);}
.leader-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.leader-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--teal);text-align:right;}
.leader-val-label{font-size:11px;color:var(--txt3);text-align:right;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.bar-wrap{flex:2;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:80px;}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--teal2));transition:width 0.6s ease;}

/* ── SCATTER MODE ── */
.scatter-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.preset-btn{padding:8px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.preset-btn:hover,.preset-btn.active{border-color:var(--teal);background:rgba(0,212,255,0.06);}
.preset-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--txt);}
.preset-sub{font-family:var(--mono);font-size:9px;color:var(--txt3);}
.axis-row{display:flex;gap:12px;margin-bottom:12px;align-items:center;}
.axis-label{font-family:var(--mono);font-size:10px;color:var(--txt3);letter-spacing:1px;width:50px;}
.axis-select{flex:1;padding:7px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;outline:none;transition:border-color 0.15s;}
.axis-select:focus{border-color:var(--teal);}
.scatter-container{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;position:relative;}
.scatter-canvas-wrap{position:relative;width:100%;padding-bottom:60%;}
#scatterCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;}
.scatter-tooltip{position:fixed;z-index:999;background:var(--s2);border:1px solid var(--bdr2);border-radius:10px;padding:12px 14px;pointer-events:none;opacity:0;transition:opacity 0.15s;box-shadow:0 12px 40px rgba(0,0,0,0.5);min-width:180px;}
.scatter-tooltip.show{opacity:1;}
.st-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px;}
.st-row{display:flex;justify-content:space-between;gap:16px;font-family:var(--mono);font-size:11px;color:var(--txt2);margin-top:3px;}
.st-label{color:var(--txt3);}

/* ── COMPARE MODE ── */
.compare-searches{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.compare-search-wrap{position:relative;}
.compare-input{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;}
.compare-input:focus{border-color:var(--teal);}
.compare-input::placeholder{color:var(--txt3);}
.compare-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;z-index:50;max-height:240px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.compare-result{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background 0.1s;}
.compare-result:last-child{border-bottom:none;}
.compare-result:hover{background:rgba(0,212,255,0.06);}
.cr-hs{width:28px;height:28px;border-radius:50%;object-fit:cover;object-position:top;background:var(--s3);}
.cr-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);flex:1;}
.cr-meta{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.compare-selected{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s2);border:1px solid var(--bdr2);border-radius:9px;margin-bottom:8px;}
.cs-hs{width:44px;height:44px;border-radius:50%;object-fit:cover;object-position:top;background:var(--s3);}
.cs-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--txt);flex:1;}
.cs-meta{font-family:var(--mono);font-size:11px;color:var(--txt3);}
.cs-clear{width:22px;height:22px;border-radius:50%;background:rgba(255,61,87,0.1);border:1px solid rgba(255,61,87,0.2);color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.compare-bars{display:flex;flex-direction:column;gap:0;}
.cmp-row{display:grid;grid-template-columns:100px 1fr 80px 1fr 100px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--bdr);}
.cmp-row:last-child{border-bottom:none;}
.cmp-val-a{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal);text-align:right;}
.cmp-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--txt3);text-align:center;}
.cmp-val-b{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal);text-align:left;}
.cmp-bar-a{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;direction:rtl;}
.cmp-bar-b{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.cmp-fill{height:100%;border-radius:4px;}
.cmp-fill-a{background:linear-gradient(90deg,var(--teal2),var(--teal));}
.cmp-fill-b{background:linear-gradient(90deg,var(--purple),var(--teal));}
.cmp-val-a.winner{color:var(--green);}
.cmp-val-b.winner{color:var(--green);}

/* LOADING */
.loading-state{text-align:center;padding:80px 24px;color:var(--txt3);font-family:var(--mono);font-size:12px;}
.loading-state h3{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--txt2);margin-bottom:8px;}

/* POS COLORS */
.pos-QB .bar-fill{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.pos-RB .bar-fill{background:linear-gradient(90deg,var(--green),#00ff88);}
.pos-WR .bar-fill{background:linear-gradient(90deg,var(--gold),#ffd700);}
.pos-TE .bar-fill{background:linear-gradient(90deg,var(--red),#ff6b7a);}

@media(max-width:768px){
  .nav-links{display:none;}
  .compare-searches{grid-template-columns:1fr;}
  .cmp-row{grid-template-columns:60px 1fr 60px 1fr 60px;font-size:13px;}
}
</style>
</head>

// ── FORMAT VALUE ──
function fmtVal(v, fmt) {
  if (v == null || isNaN(v)) return '—';
  switch(fmt) {
    case 'ppg':   return v.toFixed(1);
    case 'pct':   return (v*100).toFixed(1)+'%';
    case 'dec':   return v.toFixed(2);
    case 'total': return Math.round(v).toLocaleString();
    case 'val':   return Math.round(v).toLocaleString();
    default:      return v.toFixed(1);
  }
}

// ── LOAD ALL DATA ──
async function loadStats() {
  SEASON = document.getElementById('seasonSelect').value;
  document.getElementById('mainContent').innerHTML = `
    <div class="loading-state"><h3>LOADING STATS</h3><p>Pulling ${SEASON} data from NFLverse + NGS + PFR...</p></div>`;

  try {
    await loadDynastyValues();

    // Use position_group which is more reliable in NFLverse
    const posGroup = POS === 'QB' ? 'QB' : POS === 'RB' ? 'RB' : POS === 'WR' ? 'WR' : 'TE';
    const [weeklyRes, ngsRes, pfrRes] = await Promise.all([
      fetch(`/api/stats?file=player_stats_week&season=${SEASON}&position_group=${posGroup}`),
      fetch(`/api/stats?file=${ngsFile()}&season=${SEASON}`).catch(()=>null),
      fetch(`/api/stats?file=${pfrFile()}&season=${SEASON}`).catch(()=>null),
    ]);

    if (!weeklyRes.ok) throw new Error(`API error: ${weeklyRes.status}`);
    const weeklyData = await weeklyRes.json();
    if (!weeklyData.rows?.length) throw new Error(`No data for ${SEASON} ${POS}s`);

    // Parse supplementary data
    const ngsData  = ngsRes?.ok  ? await ngsRes.json().catch(()=>null)  : null;
    const pfrData  = pfrRes?.ok  ? await pfrRes.json().catch(()=>null)  : null;

    // Build NGS lookup by normalized name
    const ngsMap = {};
    for (const row of (ngsData?.rows || [])) {
      const name = row.player_display_name;
      if (!name) continue;
      // NGS files may not have season_type or it may be blank — don't filter
      const key = normName(name);
      if (!ngsMap[key]) ngsMap[key] = { _n: 0 };
      const m = ngsMap[key];
      const n = k => { const v=parseFloat(row[k]); return isNaN(v)?null:v; };
      m._n++;
      // NGS receiving (WR/TE)
      if (n('avg_separation')    != null) { m._sep    = (m._sep||0)    + n('avg_separation');    m._sep_g    = (m._sep_g||0)+1; }
      if (n('avg_cushion')       != null) { m._cush   = (m._cush||0)   + n('avg_cushion');       m._cush_g   = (m._cush_g||0)+1; }
      if (n('avg_yac_above_expectation') != null) { m._yacoe = (m._yacoe||0) + n('avg_yac_above_expectation'); m._yacoe_g = (m._yacoe_g||0)+1; }
      if (n('avg_intended_air_yards')    != null) { m._iay   = (m._iay||0)   + n('avg_intended_air_yards');    m._iay_g   = (m._iay_g||0)+1; }
      // NGS rush (RB)
      if (n('rush_yards_over_expected')          != null) { m._ryoe     = (m._ryoe||0)     + n('rush_yards_over_expected'); }
      if (n('rush_yards_over_expected_per_att')  != null) { m._ryoe_att = (m._ryoe_att||0) + n('rush_yards_over_expected_per_att'); }
      if (n('rush_pct_over_expected')            != null) { m._rpoe     = (m._rpoe||0)     + n('rush_pct_over_expected'); }
      if (n('efficiency')                        != null) { m._reff     = (m._reff||0)     + n('efficiency'); }
      if (n('percent_attempts_gte_eight_defenders') != null) { m._sbox  = (m._sbox||0)     + n('percent_attempts_gte_eight_defenders'); }
      if (n('avg_time_to_los')                   != null) { m._tlos     = (m._tlos||0)     + n('avg_time_to_los'); }
      // NGS pass (QB)
      if (n('avg_time_to_throw')                       != null) { m._ttt  = (m._ttt||0)  + n('avg_time_to_throw'); }
      if (n('aggressiveness')                          != null) { m._agg  = (m._agg||0)  + n('aggressiveness'); }
      if (n('avg_air_yards')                           != null) { m._iay  = (m._iay||0)  + n('avg_air_yards'); m._iay_g = (m._iay_g||0)+1; }
      if (n('times_pressured_pct')                     != null) { m._upct = (m._upct||0) + n('times_pressured_pct'); }
      if (n('completion_percentage_above_expectation') != null) { m._cpoe_ngs = (m._cpoe_ngs||0) + n('completion_percentage_above_expectation'); }
    }

    // Build PFR lookup by normalized name
    const pfrMap = {};
    for (const row of (pfrData?.rows || [])) {
      const name = row.pfr_player_name || row.player;
      if (!name) continue;
      const key = normName(name);
      const n = k => { const v=parseFloat(row[k]); return isNaN(v)?null:v; };
      pfrMap[key] = {
        adot:      n('adot') || n('avg_depth_of_target'),
        drop_rate: n('drop_pct') != null ? n('drop_pct')/100 : null,
        yac:       n('yac'),
        broken_tackles: n('brk_tkl') || n('broken_tackles'),
        ybc_att:   n('ybc_att') || n('ybc_per_att'),
        yac_att:   n('yac_att') || n('yac_per_att'),
      };
    }

    // Process weekly data
    const playerMap = {};
    const BOOM_THRESH = { QB:25, RB:20, WR:15, TE:12 };
    const BUST_THRESH = { QB:10, RB:5,  WR:5,  TE:5  };

    for (const row of weeklyData.rows) {
      if (!row.player_id || !row.player_display_name) continue;
      // Accept both exact position match and position_group match
      const rowPos = (row.position || '').toUpperCase();
      const rowPosGroup = (row.position_group || '').toUpperCase();
      if (rowPos !== POS && rowPosGroup !== POS) continue;
      if (row.season_type !== 'REG') continue;

      const id = row.player_id;
      const num = k => { const v=parseFloat(row[k]); return isNaN(v)?0:v; };

      if (!playerMap[id]) {
        playerMap[id] = {
          id, name:row.player_display_name, pos:row.position,
          team:row.recent_team,
          headshot:row.headshot_url || `https://sleepercdn.com/content/nfl/players/${id}.jpg`,
          games:0, weeks:[],
          _pts:0,_pass_yds:0,_pass_tds:0,_comp:0,_att:0,_ints:0,
          _rush_yds:0,_rush_tds:0,_carries:0,_rush_fd:0,
          _rec_yds:0,_rec_tds:0,_rec:0,_tgt:0,_rec_fd:0,
          _pass_epa:0,_rush_epa:0,_rec_epa:0,_cpoe:0,_cpoe_g:0,
          _tgt_share:0,_air_share:0,_wopr:0,_racr:0,
          _tgt_share_g:0,_air_share_g:0,_wopr_g:0,_racr_g:0
        };
      }
      const p = playerMap[id];
      const pts = num('fantasy_points_ppr');
      p.games++; p.weeks.push(pts);
      p._pts       += pts;
      p._pass_yds  += num('passing_yards');
      p._pass_tds  += num('passing_tds');
      p._comp      += num('completions');
      p._att       += num('attempts');
      p._ints      += num('passing_interceptions');
      p._rush_yds  += num('rushing_yards');
      p._rush_tds  += num('rushing_tds');
      p._carries   += num('carries');
      p._rush_fd   += num('rushing_first_downs');
      p._rec_yds   += num('receiving_yards');
      p._rec_tds   += num('receiving_tds');
      p._rec       += num('receptions');
      p._tgt       += num('targets');
      p._rec_fd    += num('receiving_first_downs');
      p._pass_epa  += num('passing_epa');
      p._rush_epa  += num('rushing_epa');
      p._rec_epa   += num('receiving_epa');
      const cpoe = num('passing_cpoe');
      if (cpoe) { p._cpoe += cpoe; p._cpoe_g++; }
      const ts=num('target_share'); if(ts>0){p._tgt_share+=ts;p._tgt_share_g++;}
      const as=num('air_yards_share'); if(as>0){p._air_share+=as;p._air_share_g++;}
      const wo=num('wopr'); if(wo>0){p._wopr+=wo;p._wopr_g++;}
      const ra=num('racr'); if(ra>0){p._racr+=ra;p._racr_g++;}
    }

    // Compute final stats + merge supplementary
    for (const p of Object.values(playerMap)) {
      if (p.games < 3) continue;
      const g = p.games;
      p.fantasy_points_ppr  = p._pts/g;
      p.passing_yards       = p._pass_yds;
      p.passing_tds         = p._pass_tds;
      p.completions         = p._comp;
      p.attempts            = p._att;
      p.interceptions       = p._ints;
      p.rushing_yards       = p._rush_yds;
      p.rushing_tds         = p._rush_tds;
      p.carries             = p._carries;
      p.rushing_first_downs = p._rush_fd;
      p.receiving_yards     = p._rec_yds;
      p.receiving_tds       = p._rec_tds;
      p.receptions          = p._rec;
      p.targets             = p._tgt;
      p.receiving_first_downs = p._rec_fd;
      p.passing_epa         = p._pass_epa;
      p.rushing_epa         = p._rush_epa;
      p.receiving_epa       = p._rec_epa;
      p.comp_pct     = p._att>0 ? p._comp/p._att : 0;
      p.ypa          = p._att>0 ? p._pass_yds/p._att : 0;
      p.td_int       = p._ints>0 ? p._pass_tds/p._ints : p._pass_tds;
      p.ypc          = p._carries>0 ? p._rush_yds/p._carries : 0;
      p.catch_rate   = p._tgt>0 ? p._rec/p._tgt : 0;
      p.carry_share  = p._carries>0 ? Math.min(p._carries/(g*22),1) : 0;
      p.cpoe         = p._cpoe_g>0 ? p._cpoe/p._cpoe_g : null;
      p.target_share    = p._tgt_share_g>0 ? p._tgt_share/p._tgt_share_g : 0;
      p.air_yards_share = p._air_share_g>0 ? p._air_share/p._air_share_g : 0;
      p.wopr            = p._wopr_g>0 ? p._wopr/p._wopr_g : 0;
      p.racr            = p._racr_g>0 ? p._racr/p._racr_g : 0;
      const boom=BOOM_THRESH[p.pos]||15, bust=BUST_THRESH[p.pos]||5;
      p.boom_rate = p.weeks.filter(w=>w>=boom).length/p.weeks.length;
      p.bust_rate = p.weeks.filter(w=>w<=bust).length/p.weeks.length;

      // Merge NGS data
      const nk = normName(p.name);
      const ngs = ngsMap[nk];
      if (ngs && ngs._n > 0) {
        const g = ngs._n;
        p.avg_separation       = ngs._sep_g    > 0 ? ngs._sep/ngs._sep_g       : null;
        p.avg_cushion          = ngs._cush_g   > 0 ? ngs._cush/ngs._cush_g     : null;
        p.avg_yac_oe           = ngs._yacoe_g  > 0 ? ngs._yacoe/ngs._yacoe_g   : null;
        p.avg_intended_air_yds = ngs._iay_g    > 0 ? ngs._iay/ngs._iay_g       : null;
        p.rush_yards_oe        = ngs._ryoe     != null ? ngs._ryoe/g             : null;
        p.rush_yards_oe_att    = ngs._ryoe_att != null ? ngs._ryoe_att/g         : null;
        p.rush_pct_oe          = ngs._rpoe     != null ? ngs._rpoe/g/100         : null;
        p.rush_efficiency      = ngs._reff     != null ? ngs._reff/g             : null;
        p.stacked_box_rate     = ngs._sbox     != null ? ngs._sbox/g/100         : null;
        p.avg_time_to_los      = ngs._tlos     != null ? ngs._tlos/g             : null;
        p.avg_time_to_throw    = ngs._ttt      != null ? ngs._ttt/g              : null;
        p.aggressiveness       = ngs._agg      != null ? ngs._agg/g/100          : null; // pct → 0-1
        p.under_pressure_pct   = ngs._upct     != null ? ngs._upct/g/100         : null;
        // Use NGS CPOE if weekly CPOE not available
        if (!p.cpoe && ngs._cpoe_ngs != null) p.cpoe = ngs._cpoe_ngs/g;
      }

      // Merge PFR data
      const pfr = pfrMap[nk];
      if (pfr) {
        if (pfr.adot           != null) p.adot            = pfr.adot;
        if (pfr.drop_rate      != null) p.drop_rate       = pfr.drop_rate;
        if (pfr.yac            != null) p.yac             = pfr.yac;
        if (pfr.broken_tackles != null) p.broken_tackles  = pfr.broken_tackles;
        if (pfr.ybc_att        != null) p.ybc_att         = pfr.ybc_att;
        if (pfr.yac_att        != null) p.yac_att         = pfr.yac_att;
      }

      // Dynasty values
      p.dynasty_sf  = DYNASTY_VALUES.sf[nk]  || null;
      p.dynasty_1qb = DYNASTY_VALUES.qb1[nk] || null;
      p.team = p.team || '';
    }

    ALL_PLAYERS = Object.values(playerMap)
      .filter(p => p.games >= 3)
      .sort((a,b) => (b.fantasy_points_ppr||0)-(a.fantasy_points_ppr||0));

    // Auto-fallback to 2024 if no players found
    if (ALL_PLAYERS.length === 0 && SEASON === '2025') {
      console.log('No 2025 data found — falling back to 2024');
      SEASON = '2024';
      document.getElementById('seasonSelect').value = '2024';
      return loadStats();
    }

    console.log(`Loaded ${ALL_PLAYERS.length} ${POS}s (${SEASON}) — NGS: ${Object.keys(ngsMap).length} players, PFR: ${Object.keys(pfrMap).length} players`);
    renderMode();

  } catch(e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = `
      <div class="loading-state">
        <h3>ERROR LOADING STATS</h3>
        <p style="color:var(--red);margin-bottom:8px">${e.message}</p>
        <p style="font-size:11px">Try a different season or check your connection</p>
        <button onclick="loadStats()" style="margin-top:16px;padding:8px 20px;background:var(--teal);color:#000;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer">RETRY</button>
      </div>`;
  }
}

function ngsFile() {
  if (POS === 'QB') return 'ngs_pass';
  if (POS === 'RB') return 'ngs_rush';
  return 'ngs_rec'; // WR + TE
}
function pfrFile() {
  if (POS === 'RB') return 'pfr_rush';
  return 'pfr_rec'; // WR + TE + QB
}

async function loadDynastyValues() {
  try {
    const [gRes, cRes] = await Promise.all([
      fetch('/data/leland-rankings.json'),
      fetch('/data/consensus.json')
    ]);
    const gData = await gRes.json();
    const cData = await cRes.json();
    DYNASTY_VALUES.sf  = {};
    DYNASTY_VALUES.qb1 = {};
    for (const p of (gData.formats?.sf_ppr  || [])) DYNASTY_VALUES.sf[normName(p.name)]  = p.value;
    for (const p of (gData.formats?.qb1_ppr || [])) DYNASTY_VALUES.qb1[normName(p.name)] = p.value;
  } catch(e) { console.warn('Could not load dynasty values:', e); }
}

function normName(n) { return String(n).toLowerCase().replace(/[^a-z0-9]/g,''); }

// ── RENDER MODE ──
function renderMode() {
  const search = document.getElementById('tbSearch').value.toLowerCase().trim();
  let players = ALL_PLAYERS;
  if (search) players = players.filter(p => p.name.toLowerCase().includes(search) || (p.team||'').toLowerCase().includes(search));

  if (MODE === 'leaders')  renderLeaders(players);
  if (MODE === 'scatter')  renderScatter(players);
  if (MODE === 'compare')  renderCompare(players);
}

// ── LEADERS ──
let LEADER_STAT = null;
function renderLeaders(players) {
  const stats = STAT_DEFS[POS] || [];
  if (!LEADER_STAT || !stats.find(s=>s.key===LEADER_STAT)) {
    LEADER_STAT = stats[0]?.key;
  }
  const statDef = stats.find(s=>s.key===LEADER_STAT);

  const sorted = [...players]
    .filter(p => p[LEADER_STAT] != null && !isNaN(p[LEADER_STAT]))
    .sort((a,b) => {
      // Lower is better for bust rate and interceptions
      if (['bust_rate','interceptions'].includes(LEADER_STAT)) return a[LEADER_STAT] - b[LEADER_STAT];
      return b[LEADER_STAT] - a[LEADER_STAT];
    })
    .slice(0, { QB:35, RB:60, WR:100, TE:50 }[POS] || 50);

  const maxVal = sorted.length > 0 ? Math.max(...sorted.map(p=>Math.abs(p[LEADER_STAT]||0))) : 1;

  const statOptions = stats.map(s =>
    `<option value="${s.key}" ${s.key===LEADER_STAT?'selected':''}>${s.label}</option>`
  ).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="leaders-header">
      <select class="stat-select" onchange="LEADER_STAT=this.value;renderMode()">${statOptions}</select>
      <span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">${sorted.length} ${POS}s · ${SEASON}</span>
    </div>
    <div class="leaders-list">
      ${sorted.map((p,i) => {
        const val = p[LEADER_STAT];
        const barPct = maxVal > 0 ? Math.abs(val)/maxVal*100 : 0;
        const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
        const posClass = `pos-${p.pos}`;
        return `<div class="leader-row ${posClass}">
          <div class="leader-rank ${rankClass}">#${i+1}</div>
          <img class="leader-hs" src="${p.headshot}" onerror="this.style.opacity=0.1" alt="">
          <div class="leader-info">
            <div class="leader-name">${p.name}</div>
            <div class="leader-meta">${p.team||''} · ${p.pos} · ${p.games} games</div>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${barPct}%"></div></div>
          <div>
            <div class="leader-val">${fmtVal(val, statDef?.fmt||'dec')}</div>
            <div class="leader-val-label">${statDef?.label||''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:28px;padding:20px 24px;background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--bdr2);border-radius:12px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--purple))"></div>
      <div style="font-size:28px;flex-shrink:0">🤖</div>
      <div style="flex:1">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:4px">THE COACH CAN INTERPRET EVERY ONE OF THESE STATS SIMULTANEOUSLY</div>
        <div style="font-size:13px;color:var(--txt2);line-height:1.5">Ask about any player, any stat, any trend — and get an actual answer that helps you win your league. Not just numbers. Intelligence.</div>
      </div>
      <a href="/coach.html" style="flex-shrink:0;padding:10px 20px;background:var(--teal);color:#000;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;text-decoration:none;border-radius:7px;transition:all 0.15s">ASK THE COACH →</a>
    </div>`;
}

// ── SCATTER ──
let SCATTER_X = null, SCATTER_Y = null;
let scatterPlayers = [];
let hoveredDot = null;

function renderScatter(players) {
  const presets = SCATTER_PRESETS[POS] || [];
  const stats = STAT_DEFS[POS] || [];
  if (!SCATTER_X) { SCATTER_X = presets[0]?.x || stats[0]?.key; }
  if (!SCATTER_Y) { SCATTER_Y = presets[0]?.y || stats[1]?.key; }

  const statOptions = stats.map(s =>
    `<option value="${s.key}" ${s.key===SCATTER_X?'selected':''}>${s.label}</option>`
  ).join('');
  const statOptionsY = stats.map(s =>
    `<option value="${s.key}" ${s.key===SCATTER_Y?'selected':''}>${s.label}</option>`
  ).join('');

  const presetBtns = presets.map((p,i) => `
    <button class="preset-btn ${SCATTER_X===p.x&&SCATTER_Y===p.y?'active':''}"
      onclick="setPreset('${p.x}','${p.y}')">
      <div class="preset-title">${p.title}</div>
      <div class="preset-sub">${p.sub}</div>
    </button>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="scatter-presets">${presetBtns}</div>
    <div class="axis-row">
      <div class="axis-label">X AXIS</div>
      <select class="axis-select" id="xAxisSelect" onchange="SCATTER_X=this.value;drawScatter()">${statOptions}</select>
      <div class="axis-label" style="text-align:right">Y AXIS</div>
      <select class="axis-select" id="yAxisSelect" onchange="SCATTER_Y=this.value;drawScatter()">${statOptionsY}</select>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button onclick="shareChart()" style="padding:6px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:6px;color:var(--teal);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--teal)'" onmouseout="this.style.borderColor='var(--bdr)'">
        📤 SHARE CHART
      </button>
    </div>
    <div class="scatter-container">
      <div class="scatter-canvas-wrap">
        <canvas id="scatterCanvas"></canvas>
      </div>
    </div>`;

  scatterPlayers = players;
  setTimeout(() => drawScatter(), 50);
}

function setPreset(x, y) {
  SCATTER_X = x; SCATTER_Y = y;
  renderScatter(scatterPlayers);
}

function drawScatter() {
  const canvas = document.getElementById('scatterCanvas');
  if (!canvas) return;
  const wrap = canvas.parentElement;

  // Fix blurry canvas — use device pixel ratio for retina/HiDPI displays
  const dpr = window.devicePixelRatio || 1;
  const cssW = wrap.offsetWidth;
  const cssH = wrap.offsetHeight;
  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = cssW, H = cssH;

  const pad = { top:50, right:80, bottom:60, left:80 };

  const xDef = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_X);
  const yDef = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_Y);

  const pts = scatterPlayers
    .map(p => ({ p, x: p[SCATTER_X], y: p[SCATTER_Y] }))
    .filter(d => d.x != null && !isNaN(d.x) && d.y != null && !isNaN(d.y));

  if (!pts.length) {
    ctx.fillStyle = '#090e18';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(139,164,192,0.5)';
    ctx.font = `700 14px 'Barlow Condensed'`;
    ctx.textAlign = 'center';
    ctx.fillText('No data available for this combination', W/2, H/2 - 10);
    ctx.font = `400 11px 'Barlow'`;
    ctx.fillStyle = 'rgba(77,106,138,0.7)';
    ctx.fillText('NGS/PFR data may not be available for this season', W/2, H/2 + 12);
    return;
  }

  const xs = pts.map(d=>d.x), ys = pts.map(d=>d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const xPad = (xMax-xMin)*0.05 || 0.5;
  const yPad = (yMax-yMin)*0.05 || 0.5;
  const xRange = (xMax-xMin+xPad*2) || 1;
  const yRange = (yMax-yMin+yPad*2) || 1;
  const xMid = (xMin+xMax)/2, yMid = (yMin+yMax)/2;

  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top  - pad.bottom;
  const toX = v => pad.left + ((v-(xMin-xPad))/xRange)*plotW;
  const toY = v => pad.top  + ((yMax+yPad-v)/yRange)*plotH;

  // Background
  ctx.fillStyle = '#090e18';
  ctx.fillRect(0,0,W,H);

  // Quadrant backgrounds
  const midX = toX(xMid), midY = toY(yMid);
  const quads = [
    { x:pad.left, y:pad.top, w:midX-pad.left, h:midY-pad.top,        color:'rgba(255,61,87,0.05)',  label:'SELL',    lx:pad.left+10, ly:pad.top+22, align:'left' },
    { x:midX,     y:pad.top, w:W-pad.right-midX, h:midY-pad.top,      color:'rgba(0,230,118,0.05)',  label:'BUY',     lx:W-pad.right-10, ly:pad.top+22, align:'right' },
    { x:pad.left, y:midY,    w:midX-pad.left, h:H-pad.bottom-midY,    color:'rgba(255,61,87,0.03)',  label:'AVOID',   lx:pad.left+10, ly:H-pad.bottom-12, align:'left' },
    { x:midX,     y:midY,    w:W-pad.right-midX, h:H-pad.bottom-midY, color:'rgba(255,183,0,0.04)',  label:'POTENTIAL', lx:W-pad.right-10, ly:H-pad.bottom-12, align:'right' },
  ];
  quads.forEach(q => {
    ctx.fillStyle = q.color;
    ctx.fillRect(q.x, q.y, q.w, q.h);
    // Bold quadrant labels
    ctx.fillStyle = q.color.replace(/[\d.]+\)$/, '0.7)');
    ctx.font = `800 12px 'Barlow Condensed'`;
    ctx.textAlign = q.align;
    ctx.fillText(q.label, q.lx, q.ly);
  });

  // Grid lines
  ctx.strokeStyle = 'rgba(0,212,255,0.05)';
  ctx.lineWidth = 1;
  for (let i=0; i<=5; i++) {
    const x = pad.left + (i/5)*plotW;
    ctx.beginPath(); ctx.moveTo(x,pad.top); ctx.lineTo(x,H-pad.bottom); ctx.stroke();
    const y = pad.top + (i/5)*plotH;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
  }

  // Axis tick values
  ctx.fillStyle = 'rgba(77,106,138,0.8)';
  ctx.font = `500 10px 'Barlow Condensed'`;
  ctx.textAlign = 'center';
  for (let i=0; i<=5; i++) {
    const xv = xMin + (i/5)*(xMax-xMin);
    const yv = yMin + (i/5)*(yMax-yMin);
    ctx.fillText(fmtVal(xv, xDef?.fmt||'dec'), pad.left+(i/5)*plotW, H-pad.bottom+14);
    ctx.textAlign = 'right';
    ctx.fillText(fmtVal(yv, yDef?.fmt||'dec'), pad.left-6, pad.top+plotH-(i/5)*plotH+4);
    ctx.textAlign = 'center';
  }

  // Midlines
  ctx.strokeStyle = 'rgba(0,212,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(midX,pad.top); ctx.lineTo(midX,H-pad.bottom); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left,midY); ctx.lineTo(W-pad.right,midY); ctx.stroke();
  ctx.setLineDash([]);

  // Bold axis labels
  ctx.fillStyle = 'rgba(139,164,192,0.95)';
  ctx.font = `700 13px 'Barlow Condensed'`;
  ctx.letterSpacing = '1px';
  ctx.textAlign = 'center';
  ctx.fillText((xDef?.label||SCATTER_X).toUpperCase()+' →', W/2, H-10);
  ctx.save();
  ctx.translate(16, H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('↑ '+(yDef?.label||SCATTER_Y).toUpperCase(), 0, 0);
  ctx.restore();
  ctx.letterSpacing = '0px';

  // Dots
  const POS_COLORS = { QB:'#00d4ff', RB:'#00e676', WR:'#ffb700', TE:'#ff3d57' };
  scatterData = pts.map(d => {
    const cx = toX(d.x), cy = toY(d.y);
    const col = POS_COLORS[d.p.pos] || '#00d4ff';
    // Glow effect
    ctx.shadowColor = col;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI*2);
    ctx.fillStyle = col+'55';
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();
    return { cx, cy, p: d.p, xVal: d.x, yVal: d.y, col };
  });

  // Labels — white text on dark pill background, offset cleanly from dot
  const ranked = [...scatterData].map(d => ({
    ...d,
    score: (d.yVal - yMid)/yRange + (d.xVal - xMid)/xRange
  })).sort((a,b) => b.score - a.score);

  const showCount = Math.min(22, ranked.length);
  ctx.font = `700 11px 'Barlow Condensed'`;

  ranked.slice(0, showCount).forEach(d => {
    const parts = d.p.name.split(' ');
    const label = parts.length > 1 ? parts[parts.length-1] : d.p.name;
    const tw = ctx.measureText(label).width;

    // Position label to the right of dot, flip left if near edge
    let lx = d.cx + 10;
    let ly = d.cy + 4;
    if (lx + tw + 8 > W - pad.right - 4) lx = d.cx - tw - 14;

    // Dark pill background for readability
    const px = lx - 3, py = ly - 11, pw = tw + 6, ph = 14;
    ctx.fillStyle = 'rgba(5,8,14,0.75)';
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 3);
    ctx.fill();

    // White label text
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';
    ctx.fillText(label, lx, ly);
  });

  // Mouse interaction
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);
    let closest = null, minD = 24;
    for (const d of scatterData) {
      const dist = Math.hypot(mx-d.cx, my-d.cy);
      if (dist < minD) { minD=dist; closest=d; }
    }
    const tt = document.getElementById('scatterTooltip');
    if (closest) {
      const xDef2 = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_X);
      const yDef2 = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_Y);
      tt.innerHTML = `
        <div class="st-name">${closest.p.name}</div>
        <div class="st-row"><span class="st-label">${closest.p.team||''} · ${closest.p.pos} · ${closest.p.games} games</span></div>
        <div class="st-row"><span class="st-label">${xDef2?.label||SCATTER_X}:</span><span style="color:var(--teal)">${fmtVal(closest.xVal,xDef2?.fmt||'dec')}</span></div>
        <div class="st-row"><span class="st-label">${yDef2?.label||SCATTER_Y}:</span><span style="color:var(--teal)">${fmtVal(closest.yVal,yDef2?.fmt||'dec')}</span></div>
      `;
      tt.style.left = (e.clientX+14)+'px';
      tt.style.top  = (e.clientY-40)+'px';
      tt.classList.add('show');
      canvas.style.cursor = 'pointer';
    } else {
      tt.classList.remove('show');
      canvas.style.cursor = 'crosshair';
    }
  };
  canvas.onmouseleave = () => document.getElementById('scatterTooltip').classList.remove('show');
}

// ── SHARE CHART ──
function shareChart() {
  const xDef = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_X);
  const yDef = STAT_DEFS[POS]?.find(s=>s.key===SCATTER_Y);
  const params = new URLSearchParams({
    pos: POS, x: SCATTER_X, y: SCATTER_Y,
    season: SEASON, mode: 'scatter'
  });
  const url = `${window.location.origin}/stats.html?${params.toString()}`;

  if (navigator.share) {
    navigator.share({
      title: `GWTTKB — ${POS} ${xDef?.label||SCATTER_X} vs ${yDef?.label||SCATTER_Y}`,
      text: `Check out this ${POS} scatter chart on GWTTKB: ${xDef?.label||SCATTER_X} vs ${yDef?.label||SCATTER_Y}`,
      url
    }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('[onclick="shareChart()"]');
      if (btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '✓ LINK COPIED';
        btn.style.color = 'var(--green)';
        btn.style.borderColor = 'var(--green)';
        setTimeout(() => { btn.innerHTML = orig; btn.style.color='var(--teal)'; btn.style.borderColor=''; }, 2000);
      }
    }).catch(() => {
      prompt('Copy this link:', url);
    });
  }
}

// ── COMPARE ──
function renderCompare(players) {
  const stats = STAT_DEFS[POS] || [];
  document.getElementById('mainContent').innerHTML = `
    <div class="compare-searches">
      <div class="compare-search-wrap">
        ${compareA ? `
          <div class="compare-selected">
            <img class="cs-hs" src="${compareA.headshot}" onerror="this.style.opacity=0.1">
            <div class="cs-name">${compareA.name}</div>
            <div class="cs-meta">${compareA.team||''} · ${compareA.pos}</div>
            <button class="cs-clear" onclick="clearCompare('A')">✕</button>
          </div>` : `
          <input class="compare-input" id="compareSearchA" placeholder="Search ${POS}s..." oninput="showCompareResults('A',this.value)" onblur="hideCompareResults('A',200)">
          <div class="compare-dropdown" id="compareDropA" style="display:none"></div>`}
      </div>
      <div class="compare-search-wrap">
        ${compareB ? `
          <div class="compare-selected">
            <img class="cs-hs" src="${compareB.headshot}" onerror="this.style.opacity=0.1">
            <div class="cs-name">${compareB.name}</div>
            <div class="cs-meta">${compareB.team||''} · ${compareB.pos}</div>
            <button class="cs-clear" onclick="clearCompare('B')">✕</button>
          </div>` : `
          <input class="compare-input" id="compareSearchB" placeholder="Search ${POS}s..." oninput="showCompareResults('B',this.value)" onblur="hideCompareResults('B',200)">
          <div class="compare-dropdown" id="compareDropB" style="display:none"></div>`}
      </div>
    </div>
    ${compareA && compareB ? renderCompareBars(compareA, compareB, stats) :
      `<div class="loading-state" style="padding:40px"><p style="color:var(--txt3)">Select two ${POS}s to compare</p></div>`}`;
}

function renderCompareBars(a, b, stats) {
  const rows = stats.filter(s => a[s.key]!=null && b[s.key]!=null && s.key!=='dynasty_sf'&&s.key!=='dynasty_1qb')
    .concat(stats.filter(s=>s.key==='dynasty_sf'||s.key==='dynasty_1qb'));

  return `<div class="compare-bars" style="background:var(--s1);border:1px solid var(--bdr);border-radius:12px;overflow:hidden">
    ${rows.map(s => {
      const av = a[s.key], bv = b[s.key];
      if (av==null||bv==null||isNaN(av)||isNaN(bv)) return '';
      const lowerBetter = ['bust_rate','interceptions'].includes(s.key);
      const aWins = lowerBetter ? av < bv : av > bv;
      const bWins = lowerBetter ? bv < av : bv > av;
      const maxAbs = Math.max(Math.abs(av), Math.abs(bv)) || 1;
      const aPct = Math.abs(av)/maxAbs*100;
      const bPct = Math.abs(bv)/maxAbs*100;
      return `<div class="cmp-row">
        <div class="cmp-val-a ${aWins?'winner':''}">${fmtVal(av,s.fmt)}</div>
        <div class="cmp-bar-a"><div class="cmp-fill cmp-fill-a" style="width:${aPct}%"></div></div>
        <div class="cmp-label">${s.label}</div>
        <div class="cmp-bar-b"><div class="cmp-fill cmp-fill-b" style="width:${bPct}%"></div></div>
        <div class="cmp-val-b ${bWins?'winner':''}">${fmtVal(bv,s.fmt)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function showCompareResults(side, query) {
  if (!query.trim()) { hideCompareResults(side,0); return; }
  const q = query.toLowerCase();
  const results = ALL_PLAYERS.filter(p => p.name.toLowerCase().includes(q)).slice(0,6);
  const el = document.getElementById(`compareDrop${side}`);
  if (!el) return;
  el.innerHTML = results.map(p => `
    <div class="compare-result" onmousedown="selectCompare('${side}','${p.id}')">
      <img class="cr-hs" src="${p.headshot}" onerror="this.style.opacity=0.1">
      <div class="cr-name">${p.name}</div>
      <div class="cr-meta">${p.team||''} · ${p.pos} · ${fmtVal(p.fantasy_points_ppr,'ppg')} PPG</div>
    </div>`).join('');
  el.style.display = results.length ? 'block' : 'none';
}

function hideCompareResults(side, delay) {
  setTimeout(() => {
    const el = document.getElementById(`compareDrop${side}`);
    if (el) el.style.display = 'none';
  }, delay);
}

function selectCompare(side, id) {
  const p = ALL_PLAYERS.find(p => p.id === id);
  if (!p) return;
  if (side === 'A') compareA = p;
  else compareB = p;
  renderCompare(ALL_PLAYERS);
}

function clearCompare(side) {
  if (side === 'A') compareA = null;
  else compareB = null;
  renderCompare(ALL_PLAYERS);
}

// ── CONTROLS ──
function setPos(pos, btn) {
  POS = pos;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  SCATTER_X = null; SCATTER_Y = null;
  compareA = null; compareB = null;
  LEADER_STAT = null;
  loadStats();
}

function setMode(mode, btn) {
  MODE = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMode();
}

function filterPlayers(val) {
  renderMode();
}

// Init — load URL params if shared link
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('pos')) POS = urlParams.get('pos');
if (urlParams.get('season')) document.getElementById('seasonSelect').value = urlParams.get('season');
if (urlParams.get('mode') === 'scatter') {
  MODE = 'scatter';
  document.querySelectorAll('.mode-btn').forEach((b,i) => { b.classList.toggle('active', i===1); });
  if (urlParams.get('x')) SCATTER_X = urlParams.get('x');
  if (urlParams.get('y')) SCATTER_Y = urlParams.get('y');
}
// Set active pos button
document.querySelectorAll('.pos-btn').forEach(b => {
  b.classList.toggle('active', b.textContent.trim() === POS);
});
loadStats();
window.addEventListener('resize', () => { if (MODE==='scatter') drawScatter(); });
</script>
